<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的链接库 · Modrinth风格</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            background: #f3f4f6;
            padding: 40px 24px;
            color: #1f2937;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 头部 */
        .header {
            text-align: center;
            margin-bottom: 32px;
        }
        .header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .header p {
            color: #4b5563;
            margin-top: 8px;
        }

        /* 搜索框 */
        .search-wrapper {
            margin-bottom: 32px;
        }
        .search-box {
            width: 100%;
            padding: 14px 20px;
            font-size: 1rem;
            border: 1px solid #e5e7eb;
            border-radius: 60px;
            background: white;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            transition: all 0.2s;
        }
        .search-box:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
        }

        /* 卡片网格 */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 24px;
        }

        /* 单个卡片 */
        .card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 4px 6px -2px rgba(0,0,0,0.05), 0 1px 2px 0 rgba(0,0,0,0.03);
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid #eef2f6;
            display: flex;
            flex-direction: column;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -12px rgba(0,0,0,0.1);
            border-color: #d1d9e8;
        }

        /* 卡片主体 */
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 12px;
        }
        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            line-height: 1.4;
        }
        .card-title a {
            text-decoration: none;
            color: #0f172a;
        }
        .card-title a:hover {
            color: #3b82f6;
            text-decoration: underline;
        }
        .badge-group {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }
        .badge {
            background: #eef2ff;
            color: #1e40af;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 40px;
            white-space: nowrap;
        }
        .card-description {
            color: #4b5563;
            font-size: 0.85rem;
            line-height: 1.5;
            margin-bottom: 16px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
            border-top: 1px solid #edf2f7;
            padding-top: 12px;
            font-size: 0.75rem;
            color: #6c757d;
        }
        .author {
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .stats {
            display: flex;
            gap: 12px;
        }
        .stats span {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .no-results {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: 32px;
            color: #9ca3af;
            border: 1px dashed #d1d5db;
        }

        /* 返回首页链接 */
        .back-home {
            display: inline-block;
            margin-bottom: 24px;
            color: #3b82f6;
            text-decoration: none;
            font-weight: 500;
        }
        .back-home:hover {
            text-decoration: underline;
        }

        @media (max-width: 700px) {
            body { padding: 20px 16px; }
            .cards-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="container">
    <a href="index.html" class="back-home">← 返回首页</a>

    <div class="header">
        <h1>📦 我的资源库</h1>
        <p>搜索标题、描述、作者或标签 — 点击卡片标题即可访问链接</p>
    </div>

    <div class="search-wrapper">
        <input type="text" class="search-box" id="searchInput" placeholder="🔍 搜索资源... (如: fabric, api, 优化)" autocomplete="off">
    </div>

    <div id="cardsContainer" class="cards-grid"></div>
</div>

<script>
    // ==================================================
    // 🟢 在这里修改你的数据，模仿 Modrinth 卡片字段
    // 每个对象字段解释：
    //   title: 链接名称（会显示为可点击链接）
    //   url:   点击后跳转的地址（可以是外网或内部页面）
    //   description: 简短介绍（会显示在卡片上）
    //   author: 作者或来源（显示在左下角）
    //   tags:   数组，用于显示标签（如 Fabric, 优化）
    //   stats:  对象，可以包含 "downloads" 或 "updated" 等数字
    // ==================================================
    const items = [
        {
            title: "Fabric API",
            url: "https://modrinth.com/mod/fabric-api",
            description: "轻量级且模块化的API，提供通用钩子和互操作性，供 Fabric 模组使用。",
            author: "Modmuss50",
            tags: ["Fabric", "库"],
            stats: { downloads: "162M", updated: "4天前" }
        },
        {
            title: "Sodium (钠)",
            url: "https://modrinth.com/mod/sodium",
            description: "Minecraft 最快且最兼容的渲染优化模组，支持 Fabric 和 NeoForge。",
            author: "CaffeineMC",
            tags: ["Fabric", "NeoForge", "优化"],
            stats: { downloads: "147M", updated: "55分钟前" }
        },
        {
            title: "Iris Shaders",
            url: "https://modrinth.com/mod/iris",
            description: "现代 Minecraft 光影加载器，兼容 OptiFine 光影包。",
            author: "coderbot",
            tags: ["Fabric", "NeoForge", "视觉"],
            stats: { downloads: "115M", updated: "3周前" }
        },
        {
            title: "Cloth Config API",
            url: "https://modrinth.com/mod/cloth-config",
            description: "Minecraft 模组配置库，提供通用的配置界面。",
            author: "shedaniel",
            tags: ["Fabric", "Forge", "库"],
            stats: { downloads: "115M", updated: "上个月" }
        },
        // ----- 你可以把上面这些替换成你自己的链接 -----
        // 示例：个人常用网站
        {
            title: "GitHub 官网",
            url: "https://github.com",
            description: "全球最大的开发者平台，托管代码、协作开发。",
            author: "GitHub",
            tags: ["开发", "工具"],
            stats: { downloads: "—", updated: "在线" }
        },
        {
            title: "MDN Web Docs",
            url: "https://developer.mozilla.org/zh-CN/",
            description: "权威的 Web 技术文档，HTML、CSS、JavaScript 应有尽有。",
            author: "Mozilla",
            tags: ["文档", "前端"],
            stats: { downloads: "—", updated: "持续更新" }
        }
    ];
    // ==================================================

    const searchInput = document.getElementById('searchInput');
    const cardsContainer = document.getElementById('cardsContainer');

    // 渲染所有卡片（根据搜索关键词过滤）
    function renderCards(keyword = '') {
        const term = keyword.trim().toLowerCase();
        let filtered = items;
        if (term !== '') {
            filtered = items.filter(item => 
                item.title.toLowerCase().includes(term) ||
                item.description.toLowerCase().includes(term) ||
                item.author.toLowerCase().includes(term) ||
                item.tags.some(tag => tag.toLowerCase().includes(term)) ||
                (item.stats.downloads && item.stats.downloads.toLowerCase().includes(term)) ||
                (item.stats.updated && item.stats.updated.toLowerCase().includes(term))
            );
        }

        if (filtered.length === 0) {
            cardsContainer.innerHTML = `<div class="no-results">😢 没有找到与 “${escapeHtml(term)}” 相关的资源</div>`;
            return;
        }

        let html = '';
        for (let item of filtered) {
            const safeTitle = escapeHtml(item.title);
            const safeUrl = escapeHtml(item.url);
            const safeDesc = escapeHtml(item.description);
            const safeAuthor = escapeHtml(item.author);
            const tagsHtml = item.tags.map(tag => `<span class="badge">${escapeHtml(tag)}</span>`).join('');
            const downloads = item.stats.downloads || '';
            const updated = item.stats.updated || '';
            html += `
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">
                            <a href="${safeUrl}" target="_blank" rel="noopener noreferrer">${safeTitle}</a>
                        </div>
                        <div class="badge-group">
                            ${tagsHtml}
                        </div>
                    </div>
                    <div class="card-description">${safeDesc}</div>
                    <div class="card-footer">
                        <div class="author">👤 ${safeAuthor}</div>
                        <div class="stats">
                            ${downloads ? `<span>📥 ${downloads}</span>` : ''}
                            ${updated ? `<span>🕒 ${updated}</span>` : ''}
                        </div>
                    </div>
                </div>
            `;
        }
        cardsContainer.innerHTML = html;
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    searchInput.addEventListener('input', function(e) {
        renderCards(e.target.value);
    });

    // 首次加载显示全部
    renderCards();
</script>
</body>
</html>
