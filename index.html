<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>琉璃·分组链接库 | 玻璃主题+多色彩</title>
    <style>
        /* ---------- 全局样式 & 主题变量 ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 主题色定义：每个主题对应一套玻璃色调 */
        :root {
            /* 默认浅色主题（银月） */
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.5);
            --card-bg: rgba(255, 255, 255, 0.3);
            --sidebar-bg: rgba(255, 255, 255, 0.25);
            --text-primary: #1e293b;
            --text-secondary: #334155;
            --text-muted: #475569;
            --accent-primary: #3b82f6;
            --accent-hover: #2563eb;
            --badge-bg: rgba(59, 130, 246, 0.2);
            --badge-text: #1e40af;
            --btn-active-bg: rgba(59, 130, 246, 0.3);
            --shadow-color: rgba(0, 0, 0, 0.1);
            --backdrop-blur: blur(12px);
        }

        /* 深色主题（暗夜） */
        body[data-theme="dark"] {
            --glass-bg: rgba(15, 23, 42, 0.5);
            --glass-border: rgba(51, 65, 85, 0.6);
            --card-bg: rgba(30, 41, 59, 0.4);
            --sidebar-bg: rgba(15, 23, 42, 0.45);
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --accent-primary: #60a5fa;
            --accent-hover: #3b82f6;
            --badge-bg: rgba(96, 165, 250, 0.2);
            --badge-text: #bae6fd;
            --btn-active-bg: rgba(96, 165, 250, 0.3);
            --shadow-color: rgba(0, 0, 0, 0.3);
        }

        /* 紫罗兰主题 */
        body[data-theme="violet"] {
            --glass-bg: rgba(139, 92, 246, 0.25);
            --glass-border: rgba(167, 139, 250, 0.4);
            --card-bg: rgba(139, 92, 246, 0.2);
            --sidebar-bg: rgba(109, 40, 217, 0.3);
            --text-primary: #ede9fe;
            --text-secondary: #ddd6fe;
            --text-muted: #c4b5fd;
            --accent-primary: #a78bfa;
            --accent-hover: #8b5cf6;
            --badge-bg: rgba(167, 139, 250, 0.3);
            --badge-text: #e9d5ff;
            --btn-active-bg: rgba(167, 139, 250, 0.4);
            --shadow-color: rgba(0, 0, 0, 0.25);
        }

        /* 森林绿主题 */
        body[data-theme="forest"] {
            --glass-bg: rgba(16, 185, 129, 0.2);
            --glass-border: rgba(52, 211, 153, 0.35);
            --card-bg: rgba(16, 185, 129, 0.15);
            --sidebar-bg: rgba(6, 95, 70, 0.3);
            --text-primary: #ecfdf5;
            --text-secondary: #d1fae5;
            --text-muted: #a7f3d0;
            --accent-primary: #34d399;
            --accent-hover: #10b981;
            --badge-bg: rgba(52, 211, 153, 0.25);
            --badge-text: #d1fae5;
            --btn-active-bg: rgba(52, 211, 153, 0.35);
            --shadow-color: rgba(0, 0, 0, 0.2);
        }

        /* 日落橙主题 */
        body[data-theme="sunset"] {
            --glass-bg: rgba(249, 115, 22, 0.25);
            --glass-border: rgba(251, 146, 60, 0.4);
            --card-bg: rgba(249, 115, 22, 0.2);
            --sidebar-bg: rgba(194, 65, 12, 0.3);
            --text-primary: #fff7ed;
            --text-secondary: #ffedd5;
            --text-muted: #fed7aa;
            --accent-primary: #fb923c;
            --accent-hover: #f97316;
            --badge-bg: rgba(251, 146, 60, 0.3);
            --badge-text: #ffedd5;
            --btn-active-bg: rgba(251, 146, 60, 0.4);
            --shadow-color: rgba(0, 0, 0, 0.2);
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: radial-gradient(circle at 10% 30%, #c084fc, #3b82f6, #1e3c72);
            background-attachment: fixed;
            min-height: 100vh;
            padding: 20px;
            transition: background 0.3s ease;
        }
        /* 固定背景 + 磨砂层 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(45deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 2px, transparent 2px, transparent 8px);
            pointer-events: none;
            z-index: 0;
        }

        /* 主布局容器 */
        .app {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            gap: 28px;
            position: relative;
            z-index: 2;
        }

        /* 左侧导航栏 - 圆矩形玻璃框 */
        .sidebar {
            flex: 0 0 280px;
            background: var(--sidebar-bg);
            backdrop-filter: var(--backdrop-blur);
            border-radius: 32px;
            border: 1px solid var(--glass-border);
            padding: 24px 16px;
            height: fit-content;
            position: sticky;
            top: 20px;
            box-shadow: 0 8px 20px var(--shadow-color);
            transition: all 0.2s;
        }
        .sidebar-header {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--text-primary);
            padding: 0 12px 16px 12px;
            border-bottom: 1px solid var(--glass-border);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .group-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .group-btn {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(4px);
            border: 1px solid var(--glass-border);
            border-radius: 60px;
            padding: 12px 18px;
            font-size: 1rem;
            font-weight: 500;
            text-align: left;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .group-btn:hover {
            background: var(--btn-active-bg);
            transform: translateX(4px);
        }
        .group-btn.active {
            background: var(--btn-active-bg);
            border-color: var(--accent-primary);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        /* 右侧主区域 */
        .main {
            flex: 1;
            background: var(--glass-bg);
            backdrop-filter: var(--backdrop-blur);
            border-radius: 40px;
            border: 1px solid var(--glass-border);
            padding: 28px 32px;
            box-shadow: 0 8px 24px var(--shadow-color);
        }

        /* 头部：标题 + 主题选择器 */
        .header-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 28px;
        }
        .title-section h1 {
            font-size: 1.9rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, var(--accent-primary));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .title-section p {
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-top: 4px;
        }
        .theme-selector {
            display: flex;
            gap: 8px;
            background: rgba(0,0,0,0.2);
            padding: 6px 12px;
            border-radius: 60px;
            backdrop-filter: blur(4px);
        }
        .theme-option {
            width: 32px;
            height: 32px;
            border-radius: 32px;
            cursor: pointer;
            transition: transform 0.1s, border 0.1s;
            border: 2px solid transparent;
        }
        .theme-option:hover { transform: scale(1.1); }
        .theme-option.active { border-color: white; box-shadow: 0 0 0 1px rgba(0,0,0,0.3); }
        .theme-option[data-theme="light"] { background: #e2e8f0; }
        .theme-option[data-theme="dark"] { background: #1e293b; }
        .theme-option[data-theme="violet"] { background: #8b5cf6; }
        .theme-option[data-theme="forest"] { background: #10b981; }
        .theme-option[data-theme="sunset"] { background: #f97316; }

        /* 搜索框玻璃风格 */
        .search-wrapper {
            margin-bottom: 32px;
        }
        .search-box {
            width: 100%;
            padding: 14px 22px;
            background: rgba(255,255,255,0.2);
            border: 1px solid var(--glass-border);
            border-radius: 60px;
            font-size: 0.95rem;
            color: var(--text-primary);
            backdrop-filter: blur(4px);
            transition: all 0.2s;
        }
        .search-box:focus {
            outline: none;
            border-color: var(--accent-primary);
            background: rgba(255,255,255,0.3);
        }
        .search-box::placeholder {
            color: var(--text-muted);
        }

        /* 卡片网格 */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
        }

        /* 玻璃卡片 */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            padding: 20px;
            border: 1px solid var(--glass-border);
            transition: all 0.25s;
            display: flex;
            flex-direction: column;
            word-break: break-word;
        }
        .card:hover {
            transform: translateY(-6px);
            border-color: var(--accent-primary);
            box-shadow: 0 20px 30px -12px var(--shadow-color);
        }
        .card-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-title img {
            width: 22px;
            height: 22px;
            border-radius: 6px;
            background: white;
        }
        .card-title a {
            text-decoration: none;
            color: var(--text-primary);
        }
        .card-title a:hover {
            color: var(--accent-primary);
        }
        .badge-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }
        .badge {
            background: var(--badge-bg);
            color: var(--badge-text);
            font-size: 0.7rem;
            padding: 4px 12px;
            border-radius: 40px;
            font-weight: 500;
        }
        .version-info {
            font-size: 0.7rem;
            background: var(--badge-bg);
            color: var(--badge-text);
            padding: 2px 8px;
            border-radius: 30px;
            margin-bottom: 12px;
            width: fit-content;
        }
        .card-description {
            font-size: 0.85rem;
            line-height: 1.5;
            color: var(--text-secondary);
            margin-bottom: 18px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            border-top: 1px solid var(--glass-border);
            padding-top: 12px;
            font-size: 0.7rem;
            color: var(--text-muted);
        }
        .no-results {
            text-align: center;
            padding: 60px 20px;
            background: rgba(0,0,0,0.2);
            border-radius: 32px;
            color: var(--text-secondary);
        }

        @media (max-width: 860px) {
            .app { flex-direction: column; }
            .sidebar { position: static; width: 100%; }
            .group-buttons { flex-direction: row; flex-wrap: wrap; }
            .group-btn { flex: 1; text-align: center; justify-content: center; }
            .main { padding: 20px; }
        }
    </style>
</head>
<body>
<div class="app">
    <!-- 左侧分组导航 圆矩形玻璃框 -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <span>📁</span> 分组导航
        </div>
        <div class="group-buttons" id="groupButtonsContainer"></div>
    </aside>

    <!-- 右侧主内容 -->
    <main class="main">
        <div class="header-area">
            <div class="title-section">
                <h1>📦 我的琉璃库</h1>
                <p>玻璃质感 · 多彩主题 · 分组管理</p>
            </div>
            <div class="theme-selector" id="themeSelector">
                <div class="theme-option" data-theme="light" title="浅色银月"></div>
                <div class="theme-option" data-theme="dark" title="暗夜星尘"></div>
                <div class="theme-option" data-theme="violet" title="紫罗兰梦"></div>
                <div class="theme-option" data-theme="forest" title="森林晨雾"></div>
                <div class="theme-option" data-theme="sunset" title="暮色橙光"></div>
            </div>
        </div>

        <div class="search-wrapper">
            <input type="text" class="search-box" id="searchInput" placeholder="🔍 实时过滤当前分组 · 标题 / 描述 / 作者 / 标签 / 版本" autocomplete="off">
        </div>

        <div id="cardsContainer" class="cards-grid"></div>
    </main>
</div>

<script>
    // ==================================================
    // 📁 分组数据（完全保留原有结构，支持 version, stats, tags）
    // ==================================================
    const groupsData = [
        {
            groupName: "🎮 Minecraft 模组",
            items: [
                { title: "Fabric API", url: "https://modrinth.com/mod/fabric-api", description: "轻量级且模块化的API，提供通用钩子和互操作性，供 Fabric 模组使用。", author: "Modmuss50", tags: ["Fabric", "库"], stats: { downloads: "162M", updated: "4天前" }, version: "0.16.5" },
                { title: "Sodium (钠)", url: "https://modrinth.com/mod/sodium", description: "Minecraft 最快且最兼容的渲染优化模组，支持 Fabric 和 NeoForge。", author: "CaffeineMC", tags: ["Fabric", "NeoForge", "优化"], stats: { downloads: "147M", updated: "55分钟前" }, version: "0.5.8" },
                { title: "Iris Shaders", url: "https://modrinth.com/mod/iris", description: "现代 Minecraft 光影加载器，兼容 OptiFine 光影包。", author: "coderbot", tags: ["Fabric", "NeoForge", "视觉"], stats: { downloads: "115M", updated: "3周前" }, version: "1.7.0" },
                { title: "Cloth Config API", url: "https://modrinth.com/mod/cloth-config", description: "Minecraft 模组配置库，提供通用的配置界面。", author: "shedaniel", tags: ["Fabric", "Forge", "库"], stats: { downloads: "115M", updated: "上个月" }, version: "11.1.118" },
                { title: "ReplayMod (重播模组)", url: "https://modrinth.com/mod/replaymod", description: "一个可以记录、重温并分享你体验的 Minecraft 模组。", author: "Johni0702", tags: ["Fabric", "Forge", "实用","视频创作者工具"], stats: { downloads: "—", updated: "上个月" }, version: "1.20.4-2.6.14" },
                { title: "Visible Barriers (可视化屏障方块)", url: "https://modrinth.com/mod/visiblebarriers", description: "让屏障方块、光源方块等可见，对地图制作很有帮助。", author: "AmyMialee's Mods", tags: ["Fabric", "实用","辅助"], stats: { downloads: "—", updated: "上个月" }, version: "1.0.2" },
                { title: "JEI (Just Enough Items)", url: "https://modrinth.com/mod/jei", description: "查看物品合成表，模组必备。", author: "mezz", tags: ["Fabric", "Forge", "实用"], stats: { downloads: "200M", updated: "2周前" }, version: "15.3.0.8" }
            ]
        },
        {
            groupName: "🌐 常用开发网站",
            items: [
                { title: "GitHub 官网", url: "https://github.com", description: "全球最大的开发者平台，托管代码、协作开发。", author: "GitHub", tags: ["开发", "工具"], stats: { downloads: "—", updated: "在线" } },
                { title: "MDN Web Docs", url: "https://developer.mozilla.org/zh-CN/", description: "权威的 Web 技术文档，HTML、CSS、JavaScript 应有尽有。", author: "Mozilla", tags: ["文档", "前端"], stats: { downloads: "—", updated: "持续更新" } },
                { title: "Stack Overflow", url: "https://stackoverflow.com", description: "程序员问答社区，遇到 bug 时的救星。", author: "Stack Exchange", tags: ["社区", "问答"], stats: { downloads: "—", updated: "活跃" } }
            ]
        },
        {
            groupName: "📺 视频&学习",
            items: [
                { title: "哔哩哔哩", url: "https://www.bilibili.com", description: "中文弹幕视频网站，大量编程教程和模组展示。", author: "Bilibili", tags: ["视频", "学习"], stats: { downloads: "—", updated: "每日更新" } },
                { title: "YouTube", url: "https://www.youtube.com", description: "全球最大视频平台，无数技术讲座和模组介绍。", author: "Google", tags: ["视频", "教程"], stats: { downloads: "—", updated: "实时" } }
            ]
        }
    ];

    // ------------------- 全局状态 -------------------
    let currentGroupIndex = 0;
    let currentKeyword = '';

    const groupContainer = document.getElementById('groupButtonsContainer');
    const cardsContainer = document.getElementById('cardsContainer');
    const searchInput = document.getElementById('searchInput');

    // 辅助函数
    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        });
    }

    function getFavicon(url) {
        return `https://www.google.com/s2/favicons?domain=${encodeURIComponent(url)}`;
    }

    function renderCard(item) {
        const safeTitle = escapeHtml(item.title);
        const safeUrl = escapeHtml(item.url);
        const desc = escapeHtml(item.description);
        const author = escapeHtml(item.author);
        const tags = (item.tags || []).map(t => `<span class="badge">${escapeHtml(t)}</span>`).join('');
        const version = item.version ? `<div class="version-info">📌 版本 ${escapeHtml(item.version)}</div>` : '';
        const downloads = item.stats?.downloads || '';
        const updated = item.stats?.updated || '';
        const fav = getFavicon(safeUrl);

        return `
            <div class="card">
                <div class="card-title">
                    <img src="${fav}" alt="icon" loading="lazy">
                    <a href="${safeUrl}" target="_blank" rel="noopener">${safeTitle}</a>
                </div>
                <div class="badge-group">${tags}</div>
                ${version}
                <div class="card-description">${desc}</div>
                <div class="card-footer">
                    <span>👤 ${author}</span>
                    <div class="stats">
                        ${downloads ? `<span>📥 ${downloads}</span>` : ''}
                        ${updated ? `<span>🕒 ${updated}</span>` : ''}
                    </div>
                </div>
            </div>
        `;
    }

    function getFilteredItems() {
        const group = groupsData[currentGroupIndex];
        if(!group) return [];
        const kw = currentKeyword.trim().toLowerCase();
        if(!kw) return group.items;
        return group.items.filter(it => 
            it.title.toLowerCase().includes(kw) ||
            it.description.toLowerCase().includes(kw) ||
            it.author.toLowerCase().includes(kw) ||
            (it.tags && it.tags.some(t => t.toLowerCase().includes(kw))) ||
            (it.version && it.version.toLowerCase().includes(kw)) ||
            (it.stats?.downloads && it.stats.downloads.toLowerCase().includes(kw)) ||
            (it.stats?.updated && it.stats.updated.toLowerCase().includes(kw))
        );
    }

    function renderCards() {
        const items = getFilteredItems();
        if(items.length === 0) {
            cardsContainer.innerHTML = `<div class="no-results">✨ 没有找到与 “${escapeHtml(currentKeyword)}” 相关的内容</div>`;
            return;
        }
        cardsContainer.innerHTML = items.map(renderCard).join('');
    }

    function renderGroupButtons() {
        let html = '';
        groupsData.forEach((g, idx) => {
            const activeClass = idx === currentGroupIndex ? 'active' : '';
            html += `<button class="group-btn ${activeClass}" data-group-idx="${idx}">${escapeHtml(g.groupName)}</button>`;
        });
        groupContainer.innerHTML = html;
        // 绑定事件
        document.querySelectorAll('.group-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const idx = parseInt(btn.dataset.groupIdx);
                if(!isNaN(idx) && idx !== currentGroupIndex) {
                    currentGroupIndex = idx;
                    currentKeyword = '';
                    searchInput.value = '';
                    renderGroupButtons();
                    renderCards();
                }
            });
        });
    }

    // 搜索监听
    searchInput.addEventListener('input', (e) => {
        currentKeyword = e.target.value;
        renderCards();
    });

    // ---------- 主题切换 (存储 + 活跃样式) ----------
    function setTheme(themeName) {
        document.body.setAttribute('data-theme', themeName);
        localStorage.setItem('glass_theme', themeName);
        // 更新主题选择器高亮
        document.querySelectorAll('.theme-option').forEach(opt => {
            if(opt.getAttribute('data-theme') === themeName) {
                opt.classList.add('active');
            } else {
                opt.classList.remove('active');
            }
        });
    }

    function initTheme() {
        const saved = localStorage.getItem('glass_theme');
        const validThemes = ['light', 'dark', 'violet', 'forest', 'sunset'];
        if(saved && validThemes.includes(saved)) {
            setTheme(saved);
        } else {
            setTheme('light');
        }
    }

    // 绑定主题按钮事件
    function bindThemeEvents() {
        document.querySelectorAll('.theme-option').forEach(opt => {
            opt.addEventListener('click', () => {
                const theme = opt.getAttribute('data-theme');
                if(theme) setTheme(theme);
            });
        });
    }

    // 初始化所有
    function init() {
        renderGroupButtons();
        renderCards();
        initTheme();
        bindThemeEvents();
    }
    init();
</script>
</body>
</html>
