r-layer"></div><div class="app"><aside class="sidebar" id="sidebarContainer"><div class="sidebar-header">📁 分组导航<button id="addGroupBtn" class="add-group-btn" style="display:none">➕</button></div><div class="groups-scroll-area" id="groupsScrollArea"><div class="group-buttons" id="groupButtonsContainer"></div></div><div class="version-section"><div class="version-section-header"><span class="version-section-title">⚙️ 游戏版本</span><button id="addVersionBtn" class="add-version-btn">➕</button></div><div class="version-scroll-area" id="versionScrollArea"><div class="version-list" id="versionListContainer"></div></div></div><div class="tag-section"><div class="tag-section-header"><div class="tag-section-title">🏷️ 快捷标签</div><button id="clearTagFilterBtn" class="clear-tag-btn" style="display:none">✖️ 清除</button></div><div class="tag-scroll-area" id="tagScrollArea"><div class="tag-list" id="tagListContainer"></div></div></div></aside><div class="main"><div class="header-area"><div class="title-section"><h1 id="dynamicTitle">🎮 Minecraft 模组</h1><p>自定义壁纸 | 通透模糊 | 版本筛选 | 重复管理</p></div><div class="action-buttons"><div id="dataSourceIndicator" class="data-source-indicator" style="display:none"><span class="indicator-dot"></span><span id="sourceText">云端</span></div><button class="palette-btn" id="paletteBtn">🎨 调色板</button><button class="admin-btn" id="adminBtn">🔐 管理员</button></div><div class="palette-panel" id="palettePanel"><!-- 调色板内容略 --></div></div><div id="adminToolbar" class="admin-toolbar" style="display:none"><button id="addCardBtn">➕ 新增卡片</button><button id="resetDataBtn">🔄 重置默认</button><button id="clearCacheBtn">🗑️ 清除缓存</button><button id="exportDataBtn">📤 导出JSON</button><button id="layoutSettingsBtn">🎛️ 布局</button><button id="exitAdminBtn">🔒 退出</button></div><div class="search-bar"><input type="text" class="search-box" id="searchInput" placeholder="🔍 实时过滤 · 标题 / 描述 / 作者 / 标签 / 版本"><button class="view-toggle-btn" id="viewToggleBtn">📋 列表视图</button><select class="sort-select" id="sortSelect"><option value="title-asc">🔤 标题 A-Z</option><option value="date-desc">📅 最新优先</option></select></div><div id="duplicateToolbarContainer" style="display:none;"></div><div id="cardsContainer" class="cards-grid"></div></div></div><!-- 模态框等结构同上，此处省略以避免过长，实际使用中保留原全部模态框 -->
<script>
(function(){
const DEFAULT_GROUPS_DATA=[{groupName:"🎮 Minecraft 模组",items:[{title:"Fabric API",url:"https://modrinth.com/mod/fabric-api",description:"轻量级且模块化的API",author:"Modmuss50",tags:["Fabric","库"],stats:{downloads:"162M",updated:"4天前"},version:"0.16.5",type:"link",textContent:"",mindmap:""}]},{groupName:"🌐 常用开发网站",items:[{title:"GitHub",url:"https://github.com",description:"全球开发者平台",author:"GitHub",tags:["开发"],stats:{downloads:"—",updated:"在线"},type:"link"}]},{groupName:"📺 视频&学习",items:[{title:"哔哩哔哩",url:"https://www.bilibili.com",description:"中文弹幕视频网站",author:"Bilibili",tags:["视频"],stats:{downloads:"—",updated:"每日更新"},type:"link"}]}];
const DEFAULT_VERSIONS=["1.21.1","1.20.1","1.19.2","1.18.2"];
let groupsData=JSON.parse(JSON.stringify(DEFAULT_GROUPS_DATA)),currentGroupIndex=0,currentKeyword='',isAdminMode=!1,editingCardInfo=null,currentDataSource='default',isListView=!1,hasLocalChanges=!1,currentSort='title-asc',currentTagFilter=null,currentVersionFilter=null,currentMindmapCard=null;
let versions=[...DEFAULT_VERSIONS];
function saveVersions(){localStorage.setItem('mc_versions',JSON.stringify(versions))}
function loadVersions(){const saved=localStorage.getItem('mc_versions');if(saved){try{versions=JSON.parse(saved);if(!Array.isArray(versions))versions=[...DEFAULT_VERSIONS]}catch(e){versions=[...DEFAULT_VERSIONS]}}else{versions=[...DEFAULT_VERSIONS]}}
const groupContainer=document.getElementById('groupButtonsContainer'),cardsContainer=document.getElementById('cardsContainer'),versionListContainer=document.getElementById('versionListContainer'),addVersionBtn=document.getElementById('addVersionBtn');
function renderVersionList(){if(!versionListContainer)return;let html='';versions.forEach((ver,idx)=>{const active=currentVersionFilter===ver?'active':'';html+=`<div class="version-item ${active}" data-ver="${escapeHtml(ver)}">${escapeHtml(ver)}<button class="version-delete-btn" data-idx="${idx}">×</button></div>`});versionListContainer.innerHTML=html;document.querySelectorAll('.version-item').forEach(item=>{item.addEventListener('click',(e)=>{if(e.target.classList.contains('version-delete-btn'))return;const ver=item.dataset.ver;if(currentVersionFilter===ver){currentVersionFilter=null}else{currentVersionFilter=ver}renderVersionList();renderCards();renderGroupButtons()})});document.querySelectorAll('.version-delete-btn').forEach(btn=>{btn.addEventListener('click',(e)=>{e.stopPropagation();const idx=parseInt(btn.dataset.idx);if(confirm(`删除版本 ${versions[idx]}?`)){versions.splice(idx,1);saveVersions();if(currentVersionFilter===versions[idx])currentVersionFilter=null;renderVersionList();renderCards();renderGroupButtons()}})})}
if(addVersionBtn)addVersionBtn.addEventListener('click',()=>{const newVer=prompt('输入新的游戏版本 (例如 1.21.1)');if(newVer&&newVer.trim()){const ver=newVer.trim();if(!versions.includes(ver)){versions.push(ver);saveVersions();renderVersionList()}}});

function getDisplayItems(){let items=[];if(currentTagFilter){for(const group of groupsData)for(const item of group.items)if(normalizeTags(item.tags).includes(currentTagFilter))items.push(item)}else{items=groupsData[currentGroupIndex]?.items||[]}if(currentVersionFilter){items=items.filter(it=>it.version===currentVersionFilter)}return items}
function exportData(){const data={groups:groupsData,versions:versions};const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='card_data_backup.json';a.click();URL.revokeObjectURL(url)}
function resetToDefault(){if(confirm('重置所有数据将丢失修改，确定吗？')){groupsData=JSON.parse(JSON.stringify(DEFAULT_GROUPS_DATA));versions=[...DEFAULT_VERSIONS];saveVersions();saveDataToStorage();currentGroupIndex=0;currentKeyword='';currentTagFilter=null;currentVersionFilter=null;renderAll()}}

function renderAll(){renderGroupButtons();renderVersionList();renderCards();renderTagList()}
// 启动时调用renderAll
async function start(){/* ... */renderAll();}start();
})();
