.modal .tag-btn, .modal .preset-tag-btn {

/* 智能对比度 */
function updateContrastColors(backgroundColorHex){
    const root=document.documentElement;
    let bgColor=backgroundColorHex;
    if(!bgColor){
        const bodyStyle=getComputedStyle(document.body);
        bgColor=bodyStyle.backgroundColor;
    }
    let r=128,g=128,b=128;
    if(bgColor.startsWith('#')){
        const hex=bgColor.slice(1);
        if(hex.length===3){r=parseInt(hex[0]+hex[0],16);g=parseInt(hex[1]+hex[1],16);b=parseInt(hex[2]+hex[2],16);}
        else if(hex.length===6){r=parseInt(hex.substring(0,2),16);g=parseInt(hex.substring(2,4),16);b=parseInt(hex.substring(4,6),16);}
    }else if(bgColor.startsWith('rgb')){
        const match=bgColor.match(/\d+/g);
        if(match&&match.length>=3){r=parseInt(match[0]);g=parseInt(match[1]);b=parseInt(match[2]);}
    }
    const luminance=(0.299*r+0.587*g+0.114*b)/255;
    const isDark=luminance<0.5;
    if(isDark){
        root.style.setProperty('--text-primary','#f0e6d2');root.style.setProperty('--text-secondary','#cbd5e1');root.style.setProperty('--text-tertiary','#d1d5db');
        root.style.setProperty('--text-on-accent','#12151c');root.style.setProperty('--badge-bg','rgba(255,255,240,0.2)');root.style.setProperty('--badge-text','#f0e6d2');
        root.style.setProperty('--card-footer-text','#cbd5e1');root.style.setProperty('--sidebar-text','#f5f0e0');root.style.setProperty('--sidebar-title','#f0e6d2');
    }else{
        root.style.setProperty('--text-primary','#1f2937');root.style.setProperty('--text-secondary','#4b5563');root.style.setProperty('--text-tertiary','#374151');
        root.style.setProperty('--text-on-accent','#ffffff');root.style.setProperty('--badge-bg','rgba(0,0,0,0.08)');root.style.setProperty('--badge-text','#1f2937');
        root.style.setProperty('--card-footer-text','#4b5563');root.style.setProperty('--sidebar-text','#1f2d3d');root.style.setProperty('--sidebar-title','#1f2d3d');
    }
}
const GRADIENT_THEMES=["sunset","aurora","ocean","sakura","forest","midnight","peach","mint"];
function setTheme(tn){

function updateContrastColorsAfterTheme(tn){
    if(tn==='black'||tn==='ocean'||tn==='midnight') updateContrastColors('#12151c');

    else if(tn==='forest') updateContrastColors('#b5d6a7');
    else if(tn==='peach') updateContrastColors('#ffe29a');
    else if(tn==='mint') updateContrastColors('#c7e9fb');
    else updateContrastColors('#eef2f8');
}

/* 壁纸相关 */
function compressImage(file, mw = 1920, q = 0.8) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onerror = reject;
        reader.onload = e => {
            const img = new Image();
            img.onerror = reject;
            img.onload = () => {
                let w = img.width, h = img.height;
                if (w > mw) { h = h * mw / w; w = mw; }
                const canvas = document.createElement('canvas');
                canvas.width = w; canvas.height = h;
                canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                resolve(canvas.toDataURL('image/jpeg', q));
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    });
}
function analyzeImageBrightness(dataUrl){
    const img=new Image();
    img.onload=function(){
        const canvas=document.createElement('canvas');const ctx=canvas.getContext('2d');
        const scale=Math.min(1,100/img.width,100/img.height);
        canvas.width=img.width*scale;canvas.height=img.height*scale;
        ctx.drawImage(img,0,0,canvas.width,canvas.height);
        const imageData=ctx.getImageData(0,0,canvas.width,canvas.height);
        const data=imageData.data;let totalLuminance=0,pixelCount=0;
        for(let i=0;i<data.length;i+=4){
            const r=data[i],g=data[i+1],b=data[i+2];
            totalLuminance+=(0.299*r+0.587*g+0.114*b)/255;
            pixelCount++;
        }
        updateContrastColorsLuminance(totalLuminance/pixelCount);
    };
    img.src=dataUrl;
}
function updateContrastColorsLuminance(luminance){
    const root=document.documentElement;const isDark=luminance<0.5;
    if(isDark){
        root.style.setProperty('--text-primary','#f0e6d2');root.style.setProperty('--text-secondary','#cbd5e1');root.style.setProperty('--text-tertiary','#d1d5db');
        root.style.setProperty('--text-on-accent','#12151c');root.style.setProperty('--badge-bg','rgba(255,255,240,0.2)');
        root.style.setProperty('--badge-text','#f0e6d2');root.style.setProperty('--card-footer-text','#cbd5e1');
        root.style.setProperty('--sidebar-text','#f5f0e0');root.style.setProperty('--sidebar-title','#f0e6d2');
    }else{
        root.style.setProperty('--text-primary','#1f2937');root.style.setProperty('--text-secondary','#4b5563');root.style.setProperty('--text-tertiary','#374151');
        root.style.setProperty('--text-on-accent','#ffffff');root.style.setProperty('--badge-bg','rgba(0,0,0,0.08)');
        root.style.setProperty('--badge-text','#1f2937');root.style.setProperty('--card-footer-text','#4b5563');
        root.style.setProperty('--sidebar-text','#1f2d3d');root.style.setProperty('--sidebar-title','#1f2d3d');
    }
}
async function saveWallpaper(file){
    try{
        const compressed = await compressImage(file);
        document.getElementById('wallpaper-layer').style.backgroundImage = `url(${compressed})`;

        localStorage.setItem('custom_bg_image', compressed);
        ['custom_bg_color','glass_custom_theme'].forEach(k=>localStorage.removeItem(k));
        analyzeImageBrightness(compressed);
    }catch(e){
        alert('壁纸设置失败：' + e.message);
        console.error(e);
    }
}

}

function parseVersionRange(input) { const range = input.trim(); if (!range.includes('-')) return [range]; const [start, end] = range.split('-').map(v => v.trim()); if (!start || !end) return [range]; const filtered = ALL_KNOWN_VERSIONS.filter(v => v >= start && v <= end); return filtered.length ? filtered : [range]; }

function renderTagList(){if(!tagListContainer)return;const tags=extractAllTags();if(!tags.length){tagListContainer.innerHTML='<div style="font-size:0.7rem;color:#aaa">暂无标签</div>';return}const fx=['Fabric','Forge','NeoForge'];let ft=[],ot=[];for(const [t,c] of tags)(fx.includes(t)?ft:ot).push([t,c]);ft.sort((a,b)=>fx.indexOf(a[0])-fx.indexOf(b[0]));ot.sort((a,b)=>b[1]-a[1]);let h='';for(const [t,c] of [...ft,...ot]){const ac=currentTagFilter===t?'active':'';h+=`<button class="tag-btn ${ac}" data-tag="${escapeHtml(t)}">${escapeHtml(t)} (${c})</button>`}tagListContainer.innerHTML=h;clearTagFilterBtn.style.display=currentTagFilter?'inline-flex':'none';document.querySelectorAll('.tag-btn').forEach(b=>{b.addEventListener('click',()=>{const t=b.dataset.tag;currentTagFilter=(currentTagFilter===t)?null:t;renderTagList();currentPage=1;renderCards();renderGroupButtons()})})}
function clearTagFilter(){currentTagFilter=null;renderTagList();currentPage=1;renderCards();renderGroupButtons()}

function renderGroupButtons(){if(!groupContainer)return;let h='';groupsData.forEach((g,i)=>{const ac=(i===currentGroupIndex&&!currentTagFilter)?'active':'';h+=`<div class="group-btn-row"><button class="group-btn ${ac}" data-idx="${i}">${escapeHtml(g.groupName)}</button><button class="sidebar-mini-delete-btn" data-idx="${i}">×</button></div>`});groupContainer.innerHTML=h;dynamicTitle.textContent=currentTagFilter?`标签:${currentTagFilter}`:(currentVersionFilter?`版本:${currentVersionFilter}`:groupsData[currentGroupIndex].groupName);document.querySelectorAll('.group-btn').forEach(b=>{b.addEventListener('click',()=>{const i=parseInt(b.dataset.idx);if(!isNaN(i)&&i!==currentGroupIndex){currentGroupIndex=i;currentKeyword='';if(searchInput)searchInput.value='';currentPage=1;renderGroupButtons();renderCards();renderTagList()}})});document.querySelectorAll('.group-btn-row .sidebar-mini-delete-btn').forEach(b=>{b.addEventListener('click',e=>{e.stopPropagation();const i=parseInt(b.dataset.idx);if(isAdminMode)deleteGroup(i)})});document.getElementById('sidebarContainer').classList.toggle('admin-mode',isAdminMode)}
function addNewGroup(){const n=prompt('分组名称：');if(n&&n.trim()&&!groupsData.some(g=>g.groupName===n.trim())){groupsData.push({groupName:n.trim(),items:[]});saveDataToStorage();currentGroupIndex=groupsData.length-1;currentPage=1;renderAll()}}
function deleteGroup(i){if(groupsData.length<=1)return alert('至少保留一个分组');if(confirm(`删除「${groupsData[i].groupName}」？`)){groupsData.splice(i,1);saveDataToStorage();currentGroupIndex=Math.min(currentGroupIndex,groupsData.length-1);currentPage=1;renderAll()}}

function isVersionInCard(cardVer, filterVer) { if (!cardVer || !filterVer) return false; const cv = cardVer.trim(); if (cv.includes(',')) return cv.split(',').some(v => isVersionInCard(v.trim(), filterVer)); if (cv.includes('-')) { const [start, end] = cv.split('-').map(v => v.trim()); return start <= filterVer && filterVer <= end; } return cv === filterVer; }
function getDisplayItems(){let items=[];if(currentTagFilter){for(const g of groupsData)for(const i of g.items)if(normalizeTags(i.tags).includes(currentTagFilter))items.push(i)}else{items=groupsData[currentGroupIndex]?.items||[]}if(currentVersionFilter)items=items.filter(it=>isVersionInCard(it.version, currentVersionFilter));return items}
function sortItems(items){if(currentSort==='duplicates')return []; const s=[...items]; if(currentSort==='title-asc')s.sort((a,b)=>(a.title||'').localeCompare(b.title||'','zh'));else if(currentSort==='date-desc')s.sort((a,b)=>(b.stats?.updated||'').localeCompare(a.stats?.updated||''));return s}

function getTitleDedupKey(title) { if (!title) return ''; return title.replace(/[^a-zA-Z]/g, '').toLowerCase(); }
function getDuplicateItems(gi){const items=groupsData[gi].items,m=new Map();items.forEach((it,i)=>{const k=getTitleDedupKey(it.title);if(!k) return;if(!m.has(k))m.set(k,[]);m.get(k).push({...it,cardIdx:i})});const d=[];for(const[,e] of m)if(e.length>1){e.forEach((x,j)=>{d.push({...x,isFirstDuplicate:j===0,isDuplicate:true})})}return d}
function getFilteredAndSortedItems(){if(currentSort==='duplicates')return []; let items=getDisplayItems(); const kw=currentKeyword.trim().toLowerCase(); if(kw)items=items.filter(it=>it.title.toLowerCase().includes(kw)||it.description.toLowerCase().includes(kw)||it.author.toLowerCase().includes(kw)||normalizeTags(it.tags).some(t=>t.toLowerCase().includes(kw))||(it.version&&it.version.toLowerCase().includes(kw))); return sortItems(items); }

function renderCard(item,gi,ci,extra={}){const tagsHtml=normalizeTags(item.tags).map(t=>`<span class="badge">${escapeHtml(t)}</span>`).join('');const vHtml=item.version?`<div class="version-info">📌${escapeHtml(item.version)}</div>`:'';let sb='';if(hasLocalChanges)sb='<span class="data-source-badge">💾本地</span>';else if(currentDataSource==='cloud')sb='<span class="data-source-badge">☁️云端</span>';else sb='<span class="data-source-badge">📄默认</span>';const checkboxHtml=isAdminMode?`<div class="card-checkbox-wrapper"><input type="checkbox" class="card-checkbox" data-g="${gi}" data-c="${ci}"></div>`:'';const aa=isAdminMode?`<div class="card-actions"><button class="edit-btn" data-g="${gi}" data-c="${ci}">✏️</button><button class="delete-btn" data-g="${gi}" data-c="${ci}">🗑️</button></div>`:'';let dupBadge='';if(extra.isDuplicate){dupBadge=`<div class="card-duplicate-badge">${extra.isFirstDuplicate?'重复(保留)':'重复(可删除)'}</div>`}return`<div class="card${extra.isDuplicate?' duplicate':''}" data-g="${gi}" data-c="${ci}" data-type="${item.type}" data-url="${escapeHtml(item.url||'')}" data-title="${escapeHtml(item.title)}" data-content="${escapeHtml(item.textContent||'')}">${dupBadge}${checkboxHtml}${aa}<div class="card-title"><img src="${getFavicon(item.type==='link'?item.url:'#')}" style="width:20px;height:20px;border-radius:4px"><span>${escapeHtml(item.title)}</span></div><div class="card-description">${escapeHtml(item.description||'')}</div><div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px">${tagsHtml}${vHtml}${sb}</div><div class="card-footer"><span>👤${escapeHtml(item.author)}</span><span>${item.stats?.downloads?'📥'+item.stats.downloads:''} ${item.stats?.updated?'🕒'+item.stats.updated:''}</span></div></div>`}

function buildPaginationHtml(totalPages){
    let html='';
    if(totalPages<=1)return html;
    html+='<button id="prevPageBtn" '+(currentPage===1?'disabled':'')+'>◀ 上一页</button>';
    const maxVisible=7; let startPage=Math.max(1,currentPage-Math.floor(maxVisible/2)); let endPage=Math.min(totalPages,startPage+maxVisible-1); if(endPage-startPage+1<maxVisible) startPage=Math.max(1,endPage-maxVisible+1);
    if(startPage>1){ html+=`<button class="page-btn" data-page="1">1</button>`; if(startPage>2) html+=`<span class="ellipsis">...</span>`; }
    for(let i=startPage;i<=endPage;i++){ html+=`<button class="page-btn ${i===currentPage?'active':''}" data-page="${i}">${i}</button>`; }
    if(endPage<totalPages){ if(endPage<totalPages-1) html+=`<span class="ellipsis">...</span>`; html+=`<button class="page-btn" data-page="${totalPages}">${totalPages}</button>`; }
    html+='<button id="nextPageBtn" '+(currentPage===totalPages?'disabled':'')+'>下一页 ▶</button>';
    return html;
}
function bindPaginationEvents(container){
    if(!container)return;
    container.querySelectorAll('.page-btn').forEach(btn=>{ btn.addEventListener('click',()=>{ const p=parseInt(btn.dataset.page); if(p&&p!==currentPage){ currentPage=p; renderCards(); } }) });
    container.querySelector('#prevPageBtn')?.addEventListener('click',()=>{ if(currentPage>1){ currentPage--; renderCards(); } });
    container.querySelector('#nextPageBtn')?.addEventListener('click',()=>{ const totalPages=Math.ceil(getFilteredAndSortedItems().length/pageSize)||1; if(currentPage<totalPages){ currentPage++; renderCards(); } });
}

function renderCards(){
    if(!cardsContainer)return;
    if(currentSort==='duplicates'){
        const duplicates=getDuplicateItems(currentGroupIndex);
        if(!duplicates.length){ cardsContainer.innerHTML='<div class="no-results">✨ 当前分组没有重复卡片</div>'; duplicateToolbarContainer.innerHTML=''; paginationContainerTop.innerHTML=''; paginationContainerBottom.innerHTML=''; return; }
        let h=''; duplicates.forEach(d=>{ h+=renderCard(d,currentGroupIndex,d.cardIdx,{isDuplicate:true,isFirstDuplicate:d.isFirstDuplicate??false}); });
        cardsContainer.innerHTML=h;
        duplicateToolbarContainer.innerHTML='<div class="duplicate-toolbar"><button id="batchDeleteDuplicatesBtn">🗑️ 批量删除多余重复卡片</button></div>';
        setTimeout(()=>document.getElementById('batchDeleteDuplicatesBtn')?.addEventListener('click',batchDeleteDuplicates),0);
        bindAdminCardBtns(); bindCardClicks();
        if(isListView)cardsContainer.classList.add('list-view');else cardsContainer.classList.remove('list-view');
        paginationContainerTop.innerHTML=''; paginationContainerBottom.innerHTML=''; 
        if(selectAllCheckbox) selectAllCheckbox.checked = false;
        return;
    }
    const allItems=getFilteredAndSortedItems();
    const dupMap=new Map();
    if(groupsData[currentGroupIndex]){
        const items=groupsData[currentGroupIndex].items;
        for(const it of items){ 
            const key=getTitleDedupKey(it.title);
            if(!key) continue;
            dupMap.set(key,(dupMap.get(key)||0)+1);
        }
        for(const [key,count] of dupMap){ if(count<=1) dupMap.delete(key); }
    }
    const totalPages=Math.ceil(allItems.length/pageSize)||1;
    if(currentPage>totalPages) currentPage=totalPages;
    const start=(currentPage-1)*pageSize;
    const pageItems=allItems.slice(start,start+pageSize);
    if(!pageItems.length){ cardsContainer.innerHTML='<div class="no-results">✨ 没有找到相关内容</div>'; duplicateToolbarContainer.innerHTML=''; paginationContainerTop.innerHTML=''; paginationContainerBottom.innerHTML=''; return; }
    let h=''; pageItems.forEach(item=>{ const loc=getCardLocation(item); if(loc.groupIdx!==-1&&loc.cardIdx!==-1){ const key=getTitleDedupKey(item.title); h+=renderCard(item,loc.groupIdx,loc.cardIdx,{isDuplicate:dupMap.has(key)}); } });
    cardsContainer.innerHTML=h; duplicateToolbarContainer.innerHTML='';
    
    const pagHtml = buildPaginationHtml(totalPages);
    paginationContainerTop.innerHTML = pagHtml;
    paginationContainerBottom.innerHTML = pagHtml;
    bindPaginationEvents(paginationContainerTop);
    bindPaginationEvents(paginationContainerBottom);
    
    bindAdminCardBtns(); bindCardClicks(); if(isListView)cardsContainer.classList.add('list-view');else cardsContainer.classList.remove('list-view');
    if(selectAllCheckbox) selectAllCheckbox.checked = false;
}

function getCardLocation(target){for(let g=0;g<groupsData.length;g++)for(let i=0;i<groupsData[g].items.length;i++)if(groupsData[g].items[i]===target)return{groupIdx:g,cardIdx:i};return{groupIdx:-1,cardIdx:-1}}
function bindAdminCardBtns(){if(!isAdminMode)return;document.querySelectorAll('.edit-btn').forEach(b=>{b.addEventListener('click',e=>{e.stopPropagation();const g=parseInt(b.dataset.g),c=parseInt(b.dataset.c);openEditModal(g,c,groupsData[g].items[c])})});document.querySelectorAll('.delete-btn').forEach(b=>{b.addEventListener('click',e=>{e.stopPropagation();const g=parseInt(b.dataset.g),c=parseInt(b.dataset.c);deleteCard(g,c)})})}
function bindCardClicks(){document.querySelectorAll('.card').forEach(card=>{card.addEventListener('click',e=>{if(e.target.closest('.card-actions') || e.target.type === 'checkbox')return;const type=card.dataset.type,url=card.dataset.url,title=card.dataset.title,content=card.dataset.content,g=parseInt(card.dataset.g),c=parseInt(card.dataset.c);if(type==='link'&&url)window.open(url,'_blank');else if(type==='text')openTextView(title,content);else if(type==='mindmap'&&!isNaN(g)&&!isNaN(c))openMindmap(g,c)})})}
function batchDeleteDuplicates(){const gi=currentGroupIndex,items=groupsData[gi].items,m=new Map();items.forEach((it,i)=>{const k=getTitleDedupKey(it.title);if(!k)return;if(!m.has(k))m.set(k,[]);m.get(k).push(i)});const td=[];for(const[,a] of m)if(a.length>1)a.slice(1).forEach(i=>td.push(i));if(!td.length)return alert('没有多余重复卡片');if(!confirm(`删除${td.length}张多余重复卡片？`))return;td.sort((a,b)=>b-a);td.forEach(i=>items.splice(i,1));saveDataToStorage();currentPage=1;renderAll();alert('已删除')}

function openEditModal(gi,ci,card){editingCardInfo={gi,ci,card:{...card}};document.getElementById('modalTitle').innerText=ci===undefined?'新增卡片':'编辑卡片';cardTitleInput.value=card.title||'';cardDescInput.value=card.description||'';const type=card.type||'link';setActiveTypeBtn(type);linkContentArea.style.display=type==='link'?'block':'none';textContentArea.style.display=type==='text'?'block':'none';mindmapContentArea.style.display=type==='mindmap'?'block':'none';cardUrlInput.value=card.url||'';cardTextContent.value=card.textContent||'';cardMindmapContent.value=card.mindmap||'';cardAuthorInput.value=card.author||'';cardTagsInput.value=Array.isArray(card.tags)?card.tags.join(','):(card.tags||'');cardVersionInput.value=card.version||'';cardDownloadsInput.value=card.stats?.downloads||'';modal.classList.add('active');renderDynamicTags();}
function setActiveTypeBtn(type){typeBtns.forEach(b=>{b.classList.toggle('active',b.dataset.type===type)}); currentCardType=type;}
function saveCardFromModal(){if(!editingCardInfo)return;const{gi,ci}=editingCardInfo;let type=currentCardType;const tags=cardTagsInput.value?cardTagsInput.value.split(',').map(s=>s.trim()).filter(s=>s):[];const nc={title:cardTitleInput.value.trim(),description:cardDescInput.value.trim(),author:cardAuthorInput.value.trim(),tags,version:cardVersionInput.value.trim()||undefined,stats:{downloads:cardDownloadsInput.value.trim()||'—',updated:getCurrentTimeString()},type,url:"",textContent:"",mindmap:""};if(type==='link'){nc.url=cardUrlInput.value.trim();if(!nc.url)return alert('需要网址');}else if(type==='text'){nc.textContent=cardTextContent.value.trim();if(!nc.textContent)return alert('需要文本');if(!nc.description)nc.description=nc.textContent.substring(0,80)}else{nc.mindmap=cardMindmapContent.value.trim();if(!nc.mindmap)return alert('需要导图');if(!nc.description)nc.description='思维导图'}if(!nc.title)return alert('需要标题');if(ci===undefined)groupsData[gi].items.push(nc);else groupsData[gi].items[ci]=nc;saveDataToStorage();closeModal();currentPage=1;renderAll()}
function deleteCard(gi,ci){if(confirm('确定删除？')){groupsData[gi].items.splice(ci,1);saveDataToStorage();currentPage=1;renderAll()}}
function closeModal(){modal.classList.remove('active');editingCardInfo=null}

typeBtns.forEach(b=>{b.addEventListener('click',()=>{setActiveTypeBtn(b.dataset.type);linkContentArea.style.display=currentCardType==='link'?'block':'none';textContentArea.style.display=currentCardType==='text'?'block':'none';mindmapContentArea.style.display=currentCardType==='mindmap'?'block':'none';})});

function renderDynamicTags(){if(!dynamicTagList)return;const allTags=extractAllTags().map(([tag])=>tag);const fixed=['Fabric','Forge','NeoForge'];const other=allTags.filter(t=>!fixed.includes(t));dynamicTagList.innerHTML=other.length?other.map(t=>`<button type="button" class="tag-btn" data-tag="${escapeHtml(t)}">${escapeHtml(t)}</button>`).join(''):'<span style="font-size:0.7rem;color:#aaa">暂无其他标签</span>';document.querySelectorAll('.dynamic-tag-list-wrap .tag-btn').forEach(b=>b.addEventListener('click',function(){const t=this.dataset.tag,cv=cardTagsInput.value.trim();cardTagsInput.value=cv?cv.split(',').map(s=>s.trim()).includes(t)?cv:cv+', '+t:t}))}

function parseBatchText(){
    let raw=batchTextarea.value.trim();
    if(!raw)return alert('请输入文本');
    raw=raw.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
    const lines=raw.split('\n').filter(l=>l.trim());
    let added=0,errs=[];
    lines.forEach((line,i)=>{
        let cl=line.trim();
        if(cl.endsWith('。'))cl=cl.slice(0,-1).trim();
        if(!cl)return;
        const parts=cl.split('||').map(s=>s.trim());
        if(parts.length<5){ errs.push(`第${i+1}行:格式不完整（至少5个字段）`); return; }
        const title=parts[0], desc=parts[1], url=parts[2], author=parts[3], ver=parts[4];
        const tagsStr=parts.length>=6 ? parts[5] : '';
        if(!title){ errs.push(`第${i+1}行:标题为空`); return; }
        if(!url){ errs.push(`第${i+1}行:URL为空`); return; }
        const tags=tagsStr ? tagsStr.split(',').map(s=>s.trim()).filter(s=>s) : [];
        groupsData[currentGroupIndex].items.push({title,description:desc||url,author:author||'', tags, version:ver||undefined, stats:{downloads:'—', updated:getCurrentTimeString()}, type:'link', url});
        added++;
    });
    if(errs.length) alert(`添加${added}个。错误:\n${errs.join('\n')}`); else alert(`成功添加${added}个卡片！`);
    saveDataToStorage(); batchModal.classList.remove('active'); currentPage=1; renderAll();
}

function updateLayout(){const rs=document.getElementById('radiusSlider'),ps=document.getElementById('paddingSlider'),gs=document.getElementById('gapSlider');if(!rs)return;['--card-radius',rs.value+'px','--card-padding',ps.value+'px','--card-gap',gs.value+'px'].forEach((v,i,a)=>{if(i%2===0)document.documentElement.style.setProperty(a[i],a[i+1])});['radiusVal',rs.value+'px','paddingVal',ps.value+'px','gapVal',gs.value+'px'].forEach((v,i,a)=>{if(i%2===0){const e=document.getElementById(a[i]);if(e)e.innerText=a[i+1]}});localStorage.setItem('layout_settings',JSON.stringify({radius:rs.value,padding:ps.value,gap:gs.value}))}
function buildPalette(){const sg=document.getElementById('solidColorGrid'),gg=document.getElementById('gradientColorGrid');if(sg){const colors=["#eef2f8","#12151c","#fce9e6","#fef0e0","#fef9e0","#eaf4ea","#e0f2f5","#e3edfa","#f0e9fc","#ffe0f0","#d9e6f2","#f5e6d3"];sg.innerHTML='';colors.forEach(c=>{const d=document.createElement('div');d.className='color-swatch';d.style.backgroundColor=c;d.addEventListener('click',()=>{document.getElementById('wallpaper-layer').style.backgroundImage='';document.body.classList.remove('custom-bg');document.body.style.background=c;const tn=(parseInt(c.slice(1,3),16)*0.299+parseInt(c.slice(3,5),16)*0.587+parseInt(c.slice(5,7),16)*0.114)<128?'black':'white';setTheme(tn);localStorage.setItem('custom_bg_color',c);localStorage.removeItem('custom_bg_image')});sg.appendChild(d)})}if(gg){const grads=["linear-gradient(135deg,#ff9a9e,#fecfef)","linear-gradient(135deg,#a1c4fd,#c2e9fb)","linear-gradient(135deg,#2b5876,#4e4376)","linear-gradient(135deg,#fbc2eb,#a6c1ee)","linear-gradient(135deg,#b5d6a7,#9bbd8c)","linear-gradient(135deg,#1f1c2c,#2a2a4a)","linear-gradient(135deg,#ffe29a,#ffb7b2)","linear-gradient(135deg,#c7e9fb,#b6e0fe)"];gg.innerHTML='';grads.forEach((g,i)=>{const d=document.createElement('div');d.className='color-swatch';d.style.background=g;d.addEventListener('click',()=>{document.getElementById('wallpaper-layer').style.backgroundImage='';document.body.classList.remove('custom-bg');document.body.style.background='';setTheme(GRADIENT_THEMES[i]);['custom_bg_image','custom_bg_color'].forEach(k=>localStorage.removeItem(k))});gg.appendChild(d)})}}
function initBackground(){const wl=document.getElementById('wallpaper-layer'),si=localStorage.getItem('custom_bg_image');if(si&&si.startsWith('data:image')){wl.style.backgroundImage=`url(${si})`;document.body.classList.add('custom-bg');analyzeImageBrightness(si);return}const sc=localStorage.getItem('custom_bg_color');if(sc){document.body.style.background=sc;updateContrastColors(sc);return}const st=localStorage.getItem('glass_custom_theme');if(st&&GRADIENT_THEMES.includes(st)) setTheme(st); else setTheme('white');}

/* 全选与批量删除 */
if(selectAllCheckbox) selectAllCheckbox.addEventListener('change', function(){ document.querySelectorAll('.card-checkbox').forEach(cb => cb.checked = this.checked); });
if(deleteSelectedBtn) deleteSelectedBtn.addEventListener('click', function() {
    const selected = document.querySelectorAll('.card-checkbox:checked');
    if (selected.length === 0) return alert('未选择任何卡片');
    if (!confirm(`确定删除 ${selected.length} 张选中的卡片？`)) return;
    const deletions = {};
    selected.forEach(cb => {
        const g = parseInt(cb.dataset.g), c = parseInt(cb.dataset.c);
        if (!deletions[g]) deletions[g] = [];
        deletions[g].push(c);
    });
    Object.keys(deletions).forEach(g => {
        const indices = deletions[g].sort((a,b) => b - a);
        indices.forEach(i => groupsData[g].items.splice(i, 1));
    });
    saveDataToStorage();
    if(selectAllCheckbox) selectAllCheckbox.checked = false;
    currentPage = 1; renderAll();
});

/* 所有事件绑定 */
document.getElementById('paletteBtn')?.addEventListener('click',e=>{e.stopPropagation();document.getElementById('palettePanel').classList.toggle('show')});
document.addEventListener('click',e=>{const pp=document.getElementById('palettePanel');if(pp&&!pp.contains(e.target)&&e.target!==document.getElementById('paletteBtn'))pp.classList.remove('show')});
document.getElementById('adminBtn')?.addEventListener('click',checkAdminPassword);
document.getElementById('addCardBtn')?.addEventListener('click',()=>openEditModal(currentGroupIndex,undefined,{title:'',description:'',url:'',author:'',tags:[],version:'',stats:{downloads:'—',updated:''},type:'link'}));
document.getElementById('resetDataBtn')?.addEventListener('click',resetToDefault);
document.getElementById('clearCacheBtn')?.addEventListener('click',clearAllCache);
document.getElementById('exportDataBtn')?.addEventListener('click',exportData);
document.getElementById('exitAdminBtn')?.addEventListener('click',disableAdminMode);
document.getElementById('addGroupBtn')?.addEventListener('click',addNewGroup);
modalCancel?.addEventListener('click',closeModal);
modalSave?.addEventListener('click',saveCardFromModal);
document.getElementById('openBatchImportBtn')?.addEventListener('click',()=>{modal.classList.remove('active');batchModal.classList.add('active')});
batchCancelBtn?.addEventListener('click',()=>batchModal.classList.remove('active'));
batchParseBtn?.addEventListener('click',parseBatchText);
textModalCancel?.addEventListener('click',closeTextModal);
mindmapCancel?.addEventListener('click',closeMindmap);
mindmapSave?.addEventListener('click',saveMindmap);
viewToggleBtn?.addEventListener('click',()=>{isListView=!isListView;viewToggleBtn.innerText=isListView?'🗂️ 卡片视图':'📋 列表视图';localStorage.setItem('listViewPreference',isListView?'true':'false');renderCards()});
sortSelect?.addEventListener('change',()=>{currentSort=sortSelect.value;saveSortPreference();currentPage=1;renderCards();});
pageSizeSelect?.addEventListener('change',()=>{pageSize=parseInt(pageSizeSelect.value);currentPage=1;renderCards();});
searchInput?.addEventListener('input',e=>{currentKeyword=e.target.value;currentPage=1;renderCards();});
clearTagFilterBtn?.addEventListener('click',clearTagFilter);
document.querySelectorAll('.preset-tag-btn').forEach(b=>b.addEventListener('click',function(){const t=this.dataset.tag,cv=cardTagsInput.value.trim();cardTagsInput.value=cv?cv.split(',').map(s=>s.trim()).includes(t)?cv:cv+', '+t:t}));
['radiusSlider','paddingSlider','gapSlider'].forEach(id=>document.getElementById(id)?.addEventListener('input',updateLayout));
document.getElementById('resetLayoutBtn')?.addEventListener('click',()=>{['radiusSlider','paddingSlider','gapSlider'].forEach((id,v)=>{const e=document.getElementById(id);if(e)e.value=[20,20,28][v]});updateLayout()});
document.getElementById('layoutSettingsBtn')?.addEventListener('click',()=>document.getElementById('layoutPanel').classList.toggle('show'));
document.getElementById('uploadBgBtn')?.addEventListener('click',()=>document.getElementById('bgUpload').click());
document.getElementById('bgUpload')?.addEventListener('change',async e=>{const f=e.target.files[0];if(f&&f.type.startsWith('image/')){await saveWallpaper(f);e.target.value=''}});
document.getElementById('resetBgBtn')?.addEventListener('click',resetWallpaper);
document.getElementById('opacitySlider')?.addEventListener('input',e=>{document.body.style.setProperty('--glass-opacity',e.target.value);document.getElementById('opacityValue').innerText=e.target.value;localStorage.setItem('glass_opacity',e.target.value)});
document.getElementById('angleSlider')?.addEventListener('input',e=>{document.body.style.setProperty('--gradient-angle',e.target.value+'deg');document.getElementById('angleValue').innerText=e.target.value+'°';localStorage.setItem('gradient_angle',e.target.value)});
const sOp=localStorage.getItem('glass_opacity'),sAng=localStorage.getItem('gradient_angle');
if(sOp){document.body.style.setProperty('--glass-opacity',sOp);const o=document.getElementById('opacitySlider');if(o)o.value=sOp;document.getElementById('opacityValue').innerText=sOp}
if(sAng){document.body.style.setProperty('--gradient-angle',sAng+'deg');const a=document.getElementById('angleSlider');if(a)a.value=sAng;document.getElementById('angleValue').innerText=sAng+'°'}
const sv=localStorage.getItem('listViewPreference');if(sv==='true'){isListView=true;if(viewToggleBtn)viewToggleBtn.innerText='🗂️ 卡片视图'}
const ls=localStorage.getItem('layout_settings');if(ls)try{const s=JSON.parse(ls);['radiusSlider','paddingSlider','gapSlider'].forEach((id,i)=>{const e=document.getElementById(id);if(e)e.value=[s.radius,s.padding,s.gap][i]});updateLayout()}catch(e){updateLayout()}else updateLayout();

function renderAll(){loadVersions();renderGroupButtons();renderVersionList();renderCards();renderTagList()}
async function start(){loadVersions();await loadInitialData();loadSortPreference();initBackground();buildPalette();updateSortOptions();renderAll();}start();
})();
</script></body></html>
