function compressImage(file,maxWidth=1920,quality=0.8){return new Promise((resolve,reject)=>{const reader=new FileReader();reader.readAsDataURL(file);reader.onload=(e)=>{const img=new Image();img.src=e.target.result;img.onload=()=>{let w=img.width,h=img.height;if(w>maxWidth){h=(h*maxWidth)/w;w=maxWidth}const canvas=document.createElement('canvas');canvas.width=w;canvas.height=h;const ctx=canvas.getContext('2d');ctx.drawImage(img,0,0,w,h);resolve(canvas.toDataURL('image/jpeg',quality))};img.onerror=reject};reader.onerror=reject})}

function updateOpacity(val){document.body.style.setProperty('--glass-opacity',val);const ov=document.getElementById('opacityValue');if(ov)ov.innerText=val;localStorage.setItem('glass_opacity',val)}
function updateAngle(val){document.body.style.setProperty('--gradient-angle',val+'deg');const av=document.getElementById('angleValue');if(av)av.innerText=val+'°';localStorage.setItem('gradient_angle',val)}
function initControls(){if(paletteBtn&&palettePanel){paletteBtn.addEventListener('click',(e)=>{e.stopPropagation();palettePanel.classList.toggle('show')});document.addEventListener('click',(e)=>{if(!palettePanel.contains(e.target)&&e.target!==paletteBtn)palettePanel.classList.remove('show')})}const opacitySlider=document.getElementById('opacitySlider'),angleSlider=document.getElementById('angleSlider');if(opacitySlider)opacitySlider.addEventListener('input',(e)=>updateOpacity(parseFloat(e.target.value)));if(angleSlider)angleSlider.addEventListener('input',(e)=>updateAngle(parseInt(e.target.value)));const savedOp=localStorage.getItem('glass_opacity');updateOpacity(savedOp?parseFloat(savedOp):0.20);const savedAng=localStorage.getItem('gradient_angle');updateAngle(savedAng?parseInt(savedAng):135);if(opacitySlider)opacitySlider.value=0.20;if(angleSlider)angleSlider.value=135;initBackground();const uploadBtn=document.getElementById('uploadBgBtn'),bgInput=document.getElementById('bgUpload');if(uploadBtn&&bgInput){uploadBtn.addEventListener('click',()=>bgInput.click());bgInput.addEventListener('change',async(e)=>{const f=e.target.files[0];if(f&&f.type.startsWith('image/'))await saveAndApplyWallpaper(f);bgInput.value=''})}const resetBgBtn=document.getElementById('resetBgBtn');if(resetBgBtn)resetBgBtn.addEventListener('click',()=>{wallpaperLayer.style.backgroundImage='';document.body.classList.remove('custom-bg');localStorage.removeItem('custom_bg_image');const savedColor=localStorage.getItem('custom_bg_color');if(savedColor){document.body.style.background=savedColor;setTheme(isDarkColor(savedColor)?'black':'white')}else{const savedTheme=localStorage.getItem('glass_custom_theme');if(savedTheme)setTheme(savedTheme);else setTheme('white')}})}
async function start(){await loadInitialData();initBackground();buildPalette();initControls();await loadRemoteLayoutSettings();loadLocalLayoutSettings();initLayoutControls();renderGroupButtons();renderCards();renderTagList();updateScrollGradients();if(searchInput)searchInput.addEventListener('input',(e)=>{currentKeyword=e.target.value;renderCards()})}
start();
})();
</script></body></html>
