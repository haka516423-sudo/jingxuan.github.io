<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>琉璃·云端优先 | 手动更新数据</title>
    <style>
        /* 所有样式与之前版本完全一致，为节省篇幅此处不再重复，您可直接使用原有样式 */
        /* 注意：为了代码完整性，实际部署时请将下面样式替换为完整样式（可从上一版本中复制） */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { overflow-y: scroll; }
        body { font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif; min-height: 100vh; background-attachment: fixed; transition: background 0.25s ease; padding: 28px; --glass-opacity: 0.35; --gradient-angle: 135deg; }
        /* 以下省略所有样式，请务必从您之前的代码中完整复制样式部分 */
        /* 实际使用中请将下方占位替换为您的完整样式（包括主题、卡片、侧边栏等所有CSS） */
        /* 为保证回复可读，此处省略了完整的CSS，您可以将旧版 links.html 里的 <style> ... </style> 全部复制过来 */
    </style>
</head>
<body data-theme="white">
<div class="app">
    <!-- 左侧导航栏等HTML结构不变，与之前完全相同 -->
    <!-- ... 请保持原有HTML结构 ... -->
</div>

<script>
    // ========== 默认数据（与之前完全一致） ==========
    const DEFAULT_GROUPS_DATA = [ /* 默认数据内容与之前相同，此处省略 */ ];

    // 全局变量
    let groupsData = JSON.parse(JSON.stringify(DEFAULT_GROUPS_DATA));
    let currentGroupIndex = 0;
    let currentKeyword = '';
    let isAdminMode = false;
    let editingCardInfo = null;

    // DOM 元素引用（保持原有）
    // ...

    // ========== 新：从 GitHub 加载 data.json（云端优先） ==========
    async function loadDataFromGitHub() {
        try {
            const response = await fetch('data.json?v=' + Date.now()); // 加时间戳避免缓存
            if (response.ok) {
                const remoteData = await response.json();
                if (remoteData && Array.isArray(remoteData)) {
                    groupsData = remoteData;
                    // 同时更新 localStorage 作为缓存（可选）
                    localStorage.setItem('editable_groups_data', JSON.stringify(groupsData));
                    console.log('✅ 已从 data.json 加载最新数据');
                    return true;
                }
            }
            throw new Error('无法获取 data.json');
        } catch (err) {
            console.warn('⚠️ 从 data.json 加载失败，尝试使用本地缓存', err);
            // 降级：读 localStorage 或默认数据
            const stored = localStorage.getItem('editable_groups_data');
            if (stored) {
                try {
                    groupsData = JSON.parse(stored);
                    console.log('📦 使用 localStorage 缓存数据');
                    return true;
                } catch(e) {}
            }
            groupsData = JSON.parse(JSON.stringify(DEFAULT_GROUPS_DATA));
            console.log('📄 使用默认数据');
            return false;
        }
    }

    // 保存到 localStorage（本地编辑时调用）
    function saveDataToStorage() {
        localStorage.setItem('editable_groups_data', JSON.stringify(groupsData));
    }

    // 重置为默认数据（会同时覆盖云端 data.json 吗？不会，需要手动上传）
    function resetToDefault() {
        groupsData = JSON.parse(JSON.stringify(DEFAULT_GROUPS_DATA));
        saveDataToStorage();
        currentGroupIndex = 0;
        currentKeyword = '';
        searchInput.value = '';
        renderAll();
        alert('已重置为默认数据，如需持久化到云端，请手动导出并替换 data.json');
    }

    // 导出数据（保持不变）
    function exportData() {
        const dataStr = JSON.stringify(groupsData, null, 2);
        const blob = new Blob([dataStr], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'card_data_backup.json';
        a.click();
        URL.revokeObjectURL(url);
    }

    // ========== 其他函数（renderCard, renderGroupButtons, 管理员模式等）保持不变 ==========
    // 注意：所有编辑操作（增删改）后应调用 saveDataToStorage() 保存到本地缓存，
    // 但不会自动同步到 GitHub，需要用户手动导出上传。

    // 例如在 saveCardFromModal 和 deleteCard 中，原本有 saveDataToStorage()，保持不变即可。
    // 为了保证代码完整性，下面给出一个示例修改（将原有 saveDataToStorage 替代为调用本地存储并重新渲染）。
    // 实际上您原有的函数中已经调用了 saveDataToStorage()，无需改动。

    // 初始化（改为异步）
    async function init() {
        await loadDataFromGitHub();          // 先加载云端数据
        initTheme();
        buildPalette();
        initControls();
        renderGroupButtons();
        renderCards();
        searchInput.addEventListener('input', (e) => { currentKeyword = e.target.value; renderCards(); });

        // 管理员相关事件绑定（保持原有）
        adminBtn.addEventListener('click', checkAdminPassword);
        addCardBtn.addEventListener('click', addNewCard);
        resetDataBtn.addEventListener('click', () => { if(confirm('重置所有数据将丢失当前本地修改，确定吗？')) resetToDefault(); });
        exportDataBtn.addEventListener('click', exportData);
        exitAdminBtn.addEventListener('click', disableAdminMode);
        modalCancel.addEventListener('click', closeModal);
        modalSave.addEventListener('click', saveCardFromModal);
        modal.addEventListener('click', (e) => { if(e.target === modal) closeModal(); });
    }

    // 调用初始化
    init();
</script>
</body>
</html>
