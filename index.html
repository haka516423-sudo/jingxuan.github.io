<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分组链接库 · 左侧导航 · 无展开更多</title>
    <style>
        /* ---------- 主题变量 ---------- */
        :root {
            --bg-body: #f3f4f6;
            --bg-sidebar: #ffffff;
            --bg-main: transparent;
            --card-bg: #ffffff;
            --card-border: #eef2f6;
            --text-primary: #1f2937;
            --text-secondary: #4b5563;
            --text-muted: #6c757d;
            --sidebar-border: #e5e7eb;
            --btn-active-bg: #eef2ff;
            --btn-active-text: #1e40af;
            --btn-inactive-bg: transparent;
            --btn-inactive-text: #4b5563;
            --btn-hover-bg: #f3f4f6;
            --badge-bg: #eef2ff;
            --badge-text: #1e40af;
            --link-color: #0f172a;
            --link-hover: #3b82f6;
            --shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        body.dark {
            --bg-body: #0f172a;
            --bg-sidebar: #1e293b;
            --card-bg: #1e293b;
            --card-border: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --sidebar-border: #334155;
            --btn-active-bg: #334155;
            --btn-active-text: #b9e0ff;
            --btn-inactive-bg: transparent;
            --btn-inactive-text: #cbd5e1;
            --btn-hover-bg: #334155;
            --badge-bg: #334155;
            --badge-text: #b9e0ff;
            --link-color: #e2e8f0;
            --link-hover: #60a5fa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            background: var(--bg-body);
            color: var(--text-primary);
            transition: background 0.2s, color 0.2s;
            height: 100vh;
            overflow-y: auto;  /* 右侧滚动条 */
        }

        /* 整体布局：左右结构 */
        .app {
            display: flex;
            min-height: 100vh;
        }

        /* 左侧边栏 */
        .sidebar {
            width: 260px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--sidebar-border);
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
        }

        .sidebar-header {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-primary);
            padding-bottom: 12px;
            border-bottom: 1px solid var(--sidebar-border);
        }

        .group-buttons {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .group-btn {
            text-align: left;
            padding: 10px 16px;
            border-radius: 12px;
            background: var(--btn-inactive-bg);
            color: var(--btn-inactive-text);
            border: none;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .group-btn:hover {
            background: var(--btn-hover-bg);
        }
        .group-btn.active {
            background: var(--btn-active-bg);
            color: var(--btn-active-text);
        }

        /* 右侧主内容 */
        .main {
            flex: 1;
            padding: 24px 32px;
            overflow-y: auto;
        }

        /* 头部区域（标题、主题切换） */
        .header-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }
        .title-section h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        body.dark .title-section h1 {
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            background-clip: text;
            -webkit-background-clip: text;
        }
        .title-section p {
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-top: 4px;
        }
        .theme-toggle {
            background: var(--btn-inactive-bg);
            border: 1px solid var(--sidebar-border);
            border-radius: 40px;
            padding: 8px 16px;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s;
        }
        .theme-toggle:hover {
            background: var(--btn-hover-bg);
        }

        /* 搜索框 */
        .search-wrapper {
            margin-bottom: 32px;
        }
        .search-box {
            width: 100%;
            padding: 12px 18px;
            font-size: 0.95rem;
            border: 1px solid var(--card-border);
            border-radius: 40px;
            background: var(--card-bg);
            color: var(--text-primary);
            box-shadow: var(--shadow);
        }
        .search-box:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59,130,246,0.2);
        }

        /* 卡片网格 */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }

        /* 卡片样式 */
        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid var(--card-border);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            word-break: break-word;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 20px -12px rgba(0,0,0,0.2);
            border-color: var(--link-hover);
        }
        .card-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-title img {
            width: 20px;
            height: 20px;
            border-radius: 4px;
        }
        .card-title a {
            text-decoration: none;
            color: var(--link-color);
        }
        .card-title a:hover {
            color: var(--link-hover);
            text-decoration: underline;
        }
        /* 标签组（放在标题下方） */
        .badge-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }
        .badge {
            background: var(--badge-bg);
            color: var(--badge-text);
            font-size: 0.7rem;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 40px;
            white-space: nowrap;
        }
        .version-info {
            font-size: 0.7rem;
            background: var(--badge-bg);
            color: var(--badge-text);
            display: inline-block;
            padding: 2px 8px;
            border-radius: 30px;
            margin-bottom: 12px;
            width: fit-content;
        }
        .card-description {
            color: var(--text-secondary);
            font-size: 0.85rem;
            line-height: 1.5;
            margin-bottom: 16px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
            border-top: 1px solid var(--card-border);
            padding-top: 12px;
            font-size: 0.75rem;
            color: var(--text-muted);
            flex-wrap: wrap;
            gap: 8px;
        }
        .author {
            font-weight: 500;
        }
        .stats {
            display: flex;
            gap: 12px;
        }
        .no-results {
            text-align: center;
            padding: 60px 20px;
            background: var(--card-bg);
            border-radius: 24px;
            color: var(--text-muted);
            border: 1px dashed var(--card-border);
        }

        @media (max-width: 768px) {
            .app {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                height: auto;
                position: static;
                border-right: none;
                border-bottom: 1px solid var(--sidebar-border);
                padding: 16px;
            }
            .group-buttons {
                flex-direction: row;
                flex-wrap: wrap;
            }
            .main {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
<div class="app">
    <!-- 左侧边栏 -->
    <div class="sidebar">
        <div class="sidebar-header">📁 分组导航</div>
        <div class="group-buttons" id="groupButtonsContainer"></div>
    </div>

    <!-- 右侧主内容 -->
    <div class="main">
        <div class="header-area">
            <div class="title-section">
                <h1>📦 我的资源库</h1>
                <p>左侧选择分组 · 实时搜索 · 浅色/深色模式</p>
            </div>
            <button class="theme-toggle" id="themeToggle">🌓 深色模式</button>
        </div>

        <div class="search-wrapper">
            <input type="text" class="search-box" id="searchInput" placeholder="🔍 搜索当前分组内的标题、描述、作者、标签或版本..." autocomplete="off">
        </div>

        <div id="cardsContainer" class="cards-grid"></div>
    </div>
</div>

<script>
    // ============================================
    // 分组数据（在这里维护你的链接）
    // 每个卡片增加 favicon 使用 Google S2 服务自动获取
    // ============================================
    const groupsData = [
        {
            groupName: "🎮 Minecraft 模组",
            items: [
                { title: "Fabric API", url: "https://modrinth.com/mod/fabric-api", description: "轻量级且模块化的API，提供通用钩子和互操作性，供 Fabric 模组使用。", author: "Modmuss50", tags: ["Fabric", "库"], stats: { downloads: "162M", updated: "4天前" }, version: "0.16.5" },
                { title: "Sodium (钠)", url: "https://modrinth.com/mod/sodium", description: "Minecraft 最快且最兼容的渲染优化模组，支持 Fabric 和 NeoForge。", author: "CaffeineMC", tags: ["Fabric", "NeoForge", "优化"], stats: { downloads: "147M", updated: "55分钟前" }, version: "0.5.8" },
                { title: "Iris Shaders", url: "https://modrinth.com/mod/iris", description: "现代 Minecraft 光影加载器，兼容 OptiFine 光影包。", author: "coderbot", tags: ["Fabric", "NeoForge", "视觉"], stats: { downloads: "115M", updated: "3周前" }, version: "1.7.0" },
                { title: "Cloth Config API", url: "https://modrinth.com/mod/cloth-config", description: "Minecraft 模组配置库，提供通用的配置界面。", author: "shedaniel", tags: ["Fabric", "Forge", "库"], stats: { downloads: "115M", updated: "上个月" }, version: "11.1.118" },
                { title: "ReplayMod (重播模组)", url: "https://modrinth.com/mod/replaymod", description: "一个可以记录、重温并分享你体验的 Minecraft 模组。", author: "Johni0702", tags: ["Fabric", "Forge", "实用","视频创作者工具"], stats: { downloads: "—", updated: "上个月" }, version: "1.20.4-2.6.14" },
                { title: "Visible Barriers (可视化屏障方块)", url: "https://modrinth.com/mod/visiblebarriers", description: "让屏障方块、光源方块等可见，对地图制作很有帮助。", author: "AmyMialee's Mods", tags: ["Fabric", "实用","辅助"], stats: { downloads: "—", updated: "上个月" }, version: "1.0.2" },
                { title: "JEI (Just Enough Items)", url: "https://modrinth.com/mod/jei", description: "查看物品合成表，模组必备。", author: "mezz", tags: ["Fabric", "Forge", "实用"], stats: { downloads: "200M", updated: "2周前" }, version: "15.3.0.8" }
            ]
        },
        {
            groupName: "🌐 常用开发网站",
            items: [
                { title: "GitHub 官网", url: "https://github.com", description: "全球最大的开发者平台，托管代码、协作开发。", author: "GitHub", tags: ["开发", "工具"], stats: { downloads: "—", updated: "在线" } },
                { title: "MDN Web Docs", url: "https://developer.mozilla.org/zh-CN/", description: "权威的 Web 技术文档，HTML、CSS、JavaScript 应有尽有。", author: "Mozilla", tags: ["文档", "前端"], stats: { downloads: "—", updated: "持续更新" } },
                { title: "Stack Overflow", url: "https://stackoverflow.com", description: "程序员问答社区，遇到 bug 时的救星。", author: "Stack Exchange", tags: ["社区", "问答"], stats: { downloads: "—", updated: "活跃" } }
            ]
        },
        {
            groupName: "📺 视频&学习",
            items: [
                { title: "哔哩哔哩", url: "https://www.bilibili.com", description: "中文弹幕视频网站，大量编程教程和模组展示。", author: "Bilibili", tags: ["视频", "学习"], stats: { downloads: "—", updated: "每日更新" } },
                { title: "YouTube", url: "https://www.youtube.com", description: "全球最大视频平台，无数技术讲座和模组介绍。", author: "Google", tags: ["视频", "教程"], stats: { downloads: "—", updated: "实时" } }
            ]
        }
    ];

    // ---------- 全局变量 ----------
    let currentGroupIndex = 0;          // 当前选中的分组索引
    let currentFilterKeyword = '';       // 搜索关键词

    // DOM 元素
    const groupButtonsContainer = document.getElementById('groupButtonsContainer');
    const cardsContainer = document.getElementById('cardsContainer');
    const searchInput = document.getElementById('searchInput');
    const themeToggle = document.getElementById('themeToggle');

    // ---------- 工具函数 ----------
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // 获取网站图标 URL (Google S2)
    function getFaviconUrl(url) {
        return `https://www.google.com/s2/favicons?domain=${encodeURIComponent(url)}`;
    }

    // 渲染单个卡片
    function renderCard(item) {
        const safeTitle = escapeHtml(item.title);
        const safeUrl = escapeHtml(item.url);
        const safeDesc = escapeHtml(item.description);
        const safeAuthor = escapeHtml(item.author);
        const faviconUrl = getFaviconUrl(safeUrl);
        const tagsHtml = (item.tags || []).map(tag => `<span class="badge">${escapeHtml(tag)}</span>`).join('');
        const version = item.version ? escapeHtml(item.version) : '';
        const versionHtml = version ? `<div class="version-info">📌 版本 ${version}</div>` : '';
        const downloads = item.stats?.downloads || '';
        const updated = item.stats?.updated || '';

        return `
            <div class="card">
                <div class="card-title">
                    <img src="${faviconUrl}" alt="icon" loading="lazy">
                    <a href="${safeUrl}" target="_blank" rel="noopener noreferrer">${safeTitle}</a>
                </div>
                <div class="badge-group">${tagsHtml}</div>
                ${versionHtml}
                <div class="card-description">${safeDesc}</div>
                <div class="card-footer">
                    <div class="author">👤 ${safeAuthor}</div>
                    <div class="stats">
                        ${downloads ? `<span>📥 ${downloads}</span>` : ''}
                        ${updated ? `<span>🕒 ${updated}</span>` : ''}
                    </div>
                </div>
            </div>
        `;
    }

    // 过滤当前分组内的卡片
    function getFilteredItems() {
        const group = groupsData[currentGroupIndex];
        if (!group) return [];
        const keyword = currentFilterKeyword.trim().toLowerCase();
        if (keyword === '') return group.items;
        return group.items.filter(item =>
            item.title.toLowerCase().includes(keyword) ||
            item.description.toLowerCase().includes(keyword) ||
            item.author.toLowerCase().includes(keyword) ||
            (item.tags && item.tags.some(tag => tag.toLowerCase().includes(keyword))) ||
            (item.stats?.downloads && item.stats.downloads.toLowerCase().includes(keyword)) ||
            (item.stats?.updated && item.stats.updated.toLowerCase().includes(keyword)) ||
            (item.version && item.version.toLowerCase().includes(keyword))
        );
    }

    // 渲染右侧卡片网格
    function renderCards() {
        const filtered = getFilteredItems();
        if (filtered.length === 0) {
            cardsContainer.innerHTML = `<div class="no-results">😢 当前分组没有找到与 “${escapeHtml(currentFilterKeyword)}” 相关的资源</div>`;
            return;
        }
        const cardsHtml = filtered.map(item => renderCard(item)).join('');
        cardsContainer.innerHTML = cardsHtml;
    }

    // 渲染左侧分组按钮
    function renderGroupButtons() {
        let html = '';
        groupsData.forEach((group, idx) => {
            const activeClass = idx === currentGroupIndex ? 'active' : '';
            html += `<button class="group-btn ${activeClass}" data-group-index="${idx}">${escapeHtml(group.groupName)}</button>`;
        });
        groupButtonsContainer.innerHTML = html;

        // 绑定点击事件
        document.querySelectorAll('.group-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const idx = parseInt(btn.getAttribute('data-group-index'));
                if (!isNaN(idx) && idx !== currentGroupIndex) {
                    currentGroupIndex = idx;
                    currentFilterKeyword = '';       // 切换分组时清空搜索框
                    searchInput.value = '';
                    renderGroupButtons();              // 重新渲染按钮高亮
                    renderCards();                     // 渲染新分组的卡片
                }
            });
        });
    }

    // 搜索输入事件
    function onSearchInput() {
        currentFilterKeyword = searchInput.value;
        renderCards();
    }

    // ---------- 主题切换 ----------
    function initTheme() {
        const saved = localStorage.getItem('theme');
        if (saved === 'dark') {
            document.body.classList.add('dark');
            themeToggle.textContent = '☀️ 浅色模式';
        } else {
            document.body.classList.remove('dark');
            themeToggle.textContent = '🌓 深色模式';
        }
    }
    themeToggle.addEventListener('click', () => {
        if (document.body.classList.contains('dark')) {
            document.body.classList.remove('dark');
            localStorage.setItem('theme', 'light');
            themeToggle.textContent = '🌓 深色模式';
        } else {
            document.body.classList.add('dark');
            localStorage.setItem('theme', 'dark');
            themeToggle.textContent = '☀️ 浅色模式';
        }
    });

    // ---------- 初始化 ----------
    function init() {
        renderGroupButtons();
        renderCards();
        searchInput.addEventListener('input', onSearchInput);
        initTheme();
    }

    init();
</script>
</body>
</html>
