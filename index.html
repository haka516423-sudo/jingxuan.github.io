<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分组链接库 · 可折叠 · 深色模式</title>
    <style>
        /* ---------- 全局 CSS 变量（浅色主题，默认） ---------- */
        :root {
            --bg-body: #f3f4f6;
            --bg-container: transparent;
            --card-bg: #ffffff;
            --card-border: #eef2f6;
            --text-primary: #1f2937;
            --text-secondary: #4b5563;
            --text-muted: #6c757d;
            --header-gradient-start: #1e3c72;
            --header-gradient-end: #2a5298;
            --badge-bg: #eef2ff;
            --badge-text: #1e40af;
            --btn-bg: #f1f5f9;
            --btn-border: #e2e8f0;
            --btn-text: #1e40af;
            --btn-hover: #e2e8f0;
            --footer-border: #edf2f7;
            --link-color: #0f172a;
            --link-hover: #3b82f6;
            --shadow: 0 1px 3px rgba(0,0,0,0.05);
            --shadow-hover: 0 20px 25px -12px rgba(0,0,0,0.1);
        }

        /* ---------- 深色主题变量 ---------- */
        body.dark {
            --bg-body: #0f172a;
            --card-bg: #1e293b;
            --card-border: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --header-gradient-start: #38bdf8;
            --header-gradient-end: #818cf8;
            --badge-bg: #334155;
            --badge-text: #b9e0ff;
            --btn-bg: #334155;
            --btn-border: #475569;
            --btn-text: #b9e0ff;
            --btn-hover: #475569;
            --footer-border: #334155;
            --link-color: #e2e8f0;
            --link-hover: #60a5fa;
            --shadow: 0 1px 3px rgba(0,0,0,0.3);
            --shadow-hover: 0 20px 25px -12px rgba(0,0,0,0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            background: var(--bg-body);
            padding: 40px 24px;
            color: var(--text-primary);
            transition: background 0.2s, color 0.2s;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
        }

        /* 右上角主题切换按钮 */
        .theme-toggle {
            position: absolute;
            top: 0;
            right: 0;
            background: var(--btn-bg);
            border: 1px solid var(--btn-border);
            border-radius: 40px;
            padding: 8px 16px;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--btn-text);
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(4px);
            z-index: 10;
        }
        .theme-toggle:hover {
            background: var(--btn-hover);
            transform: scale(0.98);
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }
        .header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--header-gradient-start), var(--header-gradient-end));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .header p {
            color: var(--text-secondary);
            margin-top: 8px;
        }

        .search-wrapper {
            margin-bottom: 32px;
        }
        .search-box {
            width: 100%;
            padding: 14px 20px;
            font-size: 1rem;
            border: 1px solid var(--card-border);
            border-radius: 60px;
            background: var(--card-bg);
            color: var(--text-primary);
            box-shadow: var(--shadow);
            transition: all 0.2s;
        }
        .search-box:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
        }

        /* 分组样式 */
        .group {
            margin-bottom: 32px;
            background: var(--card-bg);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: var(--shadow);
            border: 1px solid var(--card-border);
        }
        .group-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            background: var(--card-bg);
            cursor: pointer;
            user-select: none;
            transition: background 0.2s;
            border-bottom: 1px solid var(--card-border);
        }
        .group-header:hover {
            background: var(--btn-hover);
        }
        .group-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .group-title .count {
            background: var(--badge-bg);
            padding: 2px 10px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--badge-text);
        }
        .toggle-icon {
            font-size: 1.2rem;
            transition: transform 0.2s;
            color: var(--text-muted);
        }
        .group-content {
            transition: all 0.2s ease;
        }
        .group-content.collapsed {
            display: none;
        }
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 24px;
            padding: 24px;
        }
        .expand-btn-wrapper {
            padding: 8px 24px 24px 24px;
            text-align: center;
            border-top: 1px solid var(--footer-border);
        }
        .expand-btn {
            background: var(--btn-bg);
            border: 1px solid var(--btn-border);
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--btn-text);
            cursor: pointer;
            transition: all 0.2s;
        }
        .expand-btn:hover {
            background: var(--btn-hover);
            transform: scale(0.98);
        }

        /* 卡片样式 — 修复溢出问题 */
        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            box-shadow: var(--shadow);
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid var(--card-border);
            display: flex;
            flex-direction: column;
            overflow: hidden;          /* 防止溢出 */
            word-break: break-word;    /* 强制换行 */
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-hover);
            border-color: var(--link-hover);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 12px;
            flex-wrap: wrap;           /* 标签过多时换行 */
        }
        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            line-height: 1.4;
            flex: 1;
            min-width: 0;              /* 允许收缩 */
        }
        .card-title a {
            text-decoration: none;
            color: var(--link-color);
        }
        .card-title a:hover {
            color: var(--link-hover);
            text-decoration: underline;
        }
        .badge-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        .badge {
            background: var(--badge-bg);
            color: var(--badge-text);
            font-size: 0.7rem;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 40px;
            white-space: nowrap;
        }
        .card-description {
            color: var(--text-secondary);
            font-size: 0.85rem;
            line-height: 1.5;
            margin-bottom: 16px;
            display: -webkit-box;
            -webkit-line-clamp: 3;    /* 改为3行，避免信息丢失 */
            -webkit-box-orient: vertical;
            overflow: hidden;
            word-break: break-word;
        }
        .version-info {
            font-size: 0.7rem;
            background: var(--badge-bg);
            color: var(--badge-text);
            display: inline-block;
            padding: 2px 8px;
            border-radius: 30px;
            margin-bottom: 8px;
            width: fit-content;
        }
        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
            border-top: 1px solid var(--footer-border);
            padding-top: 12px;
            font-size: 0.75rem;
            color: var(--text-muted);
            flex-wrap: wrap;
            gap: 8px;
        }
        .author {
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .stats {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .stats span {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .no-results {
            text-align: center;
            padding: 60px 20px;
            background: var(--card-bg);
            border-radius: 32px;
            color: var(--text-muted);
            border: 1px dashed var(--card-border);
            margin-top: 20px;
        }
        .back-home {
            display: inline-block;
            margin-bottom: 24px;
            color: var(--link-hover);
            text-decoration: none;
            font-weight: 500;
        }
        .back-home:hover {
            text-decoration: underline;
        }
        @media (max-width: 700px) {
            body { padding: 20px 16px; }
            .cards-grid { grid-template-columns: 1fr; padding: 16px; }
            .group-header { padding: 12px 16px; }
            .expand-btn-wrapper { padding: 8px 16px 16px 16px; }
        }
    </style>
</head>
<body>
<div class="container">
    <button class="theme-toggle" id="themeToggle">🌓 深色模式</button>
    <a href="index.html" class="back-home">← 返回首页</a>

    <div class="header">
        <h1>📦 我的资源库</h1>
        <p>每组默认显示前6个卡片 · 点击「展开更多」查看全部 · 支持分组折叠和实时搜索</p>
    </div>

    <div class="search-wrapper">
        <input type="text" class="search-box" id="searchInput" placeholder="🔍 搜索标题、描述、作者、标签或版本..." autocomplete="off">
    </div>

    <div id="groupsContainer"></div>
</div>

<script>
    // ==================================================
    // 📁 分组数据（在这里维护你的链接）
    // 新增字段 version: 模组版本信息（可选）
    // ==================================================
    const groupsData = [
        {
            groupName: "🎮 Minecraft 模组",
            items: [
                { title: "Fabric API", url: "https://modrinth.com/mod/fabric-api", description: "轻量级且模块化的API，提供通用钩子和互操作性，供 Fabric 模组使用。", author: "Modmuss50", tags: ["Fabric", "库"], stats: { downloads: "162M", updated: "4天前" }, version: "0.16.5" },
                { title: "Sodium (钠)", url: "https://modrinth.com/mod/sodium", description: "Minecraft 最快且最兼容的渲染优化模组，支持 Fabric 和 NeoForge。", author: "CaffeineMC", tags: ["Fabric", "NeoForge", "优化"], stats: { downloads: "147M", updated: "55分钟前" }, version: "0.5.8" },
                { title: "Iris Shaders", url: "https://modrinth.com/mod/iris", description: "现代 Minecraft 光影加载器，兼容 OptiFine 光影包。", author: "coderbot", tags: ["Fabric", "NeoForge", "视觉"], stats: { downloads: "115M", updated: "3周前" }, version: "1.7.0" },
                { title: "Cloth Config API", url: "https://modrinth.com/mod/cloth-config", description: "Minecraft 模组配置库，提供通用的配置界面。", author: "shedaniel", tags: ["Fabric", "Forge", "库"], stats: { downloads: "115M", updated: "上个月" }, version: "11.1.118" },
                { title: "ReplayMod (重播模组)", url: "https://modrinth.com/mod/replaymod", description: "一个可以记录、重温并分享你体验的 Minecraft 模组。", author: "Johni0702", tags: ["Fabric", "Forge", "实用","视频创作者工具"], stats: { downloads: "—", updated: "上个月" }, version: "1.20.4-2.6.14" },
                { title: "Visible Barriers (可视化屏障方块)", url: "https://modrinth.com/mod/visiblebarriers", description: "让屏障方块、光源方块等可见，对地图制作很有帮助。", author: "AmyMialee's Mods", tags: ["Fabric", "实用","辅助"], stats: { downloads: "—", updated: "上个月" }, version: "1.0.2" },
                { title: "JEI (Just Enough Items)", url: "https://modrinth.com/mod/jei", description: "查看物品合成表，模组必备。", author: "mezz", tags: ["Fabric", "Forge", "实用"], stats: { downloads: "200M", updated: "2周前" }, version: "15.3.0.8" }
            ]
        },
        {
            groupName: "🌐 常用开发网站",
            items: [
                { title: "GitHub 官网", url: "https://github.com", description: "全球最大的开发者平台，托管代码、协作开发。", author: "GitHub", tags: ["开发", "工具"], stats: { downloads: "—", updated: "在线" } },
                { title: "MDN Web Docs", url: "https://developer.mozilla.org/zh-CN/", description: "权威的 Web 技术文档，HTML、CSS、JavaScript 应有尽有。", author: "Mozilla", tags: ["文档", "前端"], stats: { downloads: "—", updated: "持续更新" } },
                { title: "Stack Overflow", url: "https://stackoverflow.com", description: "程序员问答社区，遇到 bug 时的救星。", author: "Stack Exchange", tags: ["社区", "问答"], stats: { downloads: "—", updated: "活跃" } }
            ]
        },
        {
            groupName: "📺 视频&学习",
            items: [
                { title: "哔哩哔哩", url: "https://www.bilibili.com", description: "中文弹幕视频网站，大量编程教程和模组展示。", author: "Bilibili", tags: ["视频", "学习"], stats: { downloads: "—", updated: "每日更新" } },
                { title: "YouTube", url: "https://www.youtube.com", description: "全球最大视频平台，无数技术讲座和模组介绍。", author: "Google", tags: ["视频", "教程"], stats: { downloads: "—", updated: "实时" } }
            ]
        }
    ];
    // ==================================================

    const searchInput = document.getElementById('searchInput');
    const groupsContainer = document.getElementById('groupsContainer');
    const themeToggle = document.getElementById('themeToggle');

    // 主题切换逻辑
    function initTheme() {
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.body.classList.add('dark');
            themeToggle.textContent = '☀️ 浅色模式';
        } else {
            document.body.classList.remove('dark');
            themeToggle.textContent = '🌓 深色模式';
        }
    }
    themeToggle.addEventListener('click', () => {
        if (document.body.classList.contains('dark')) {
            document.body.classList.remove('dark');
            localStorage.setItem('theme', 'light');
            themeToggle.textContent = '🌓 深色模式';
        } else {
            document.body.classList.add('dark');
            localStorage.setItem('theme', 'dark');
            themeToggle.textContent = '☀️ 浅色模式';
        }
    });
    initTheme();

    // 卡片展开/分组折叠状态
    let cardExpandedState = {};
    let groupCollapsedState = {};

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function renderCard(item) {
        const safeTitle = escapeHtml(item.title);
        const safeUrl = escapeHtml(item.url);
        const safeDesc = escapeHtml(item.description);
        const safeAuthor = escapeHtml(item.author);
        const tagsHtml = (item.tags || []).map(tag => `<span class="badge">${escapeHtml(tag)}</span>`).join('');
        const downloads = item.stats?.downloads || '';
        const updated = item.stats?.updated || '';
        const version = item.version ? escapeHtml(item.version) : '';
        
        const versionHtml = version ? `<div class="version-info">📌 版本 ${version}</div>` : '';

        return `
            <div class="card">
                <div class="card-header">
                    <div class="card-title"><a href="${safeUrl}" target="_blank" rel="noopener noreferrer">${safeTitle}</a></div>
                    <div class="badge-group">${tagsHtml}</div>
                </div>
                ${versionHtml}
                <div class="card-description">${safeDesc}</div>
                <div class="card-footer">
                    <div class="author">👤 ${safeAuthor}</div>
                    <div class="stats">
                        ${downloads ? `<span>📥 ${downloads}</span>` : ''}
                        ${updated ? `<span>🕒 ${updated}</span>` : ''}
                    </div>
                </div>
            </div>
        `;
    }

    function filterGroupsByKeyword(keyword) {
        const term = keyword.trim().toLowerCase();
        if (term === '') {
            return groupsData.map(group => ({
                group: group,
                itemsFiltered: group.items,
                hasMatch: true
            }));
        }
        return groupsData.map(group => {
            const filteredItems = group.items.filter(item =>
                item.title.toLowerCase().includes(term) ||
                item.description.toLowerCase().includes(term) ||
                item.author.toLowerCase().includes(term) ||
                (item.tags && item.tags.some(tag => tag.toLowerCase().includes(term))) ||
                (item.stats?.downloads && item.stats.downloads.toLowerCase().includes(term)) ||
                (item.stats?.updated && item.stats.updated.toLowerCase().includes(term)) ||
                (item.version && item.version.toLowerCase().includes(term))
            );
            return {
                group: group,
                itemsFiltered: filteredItems,
                hasMatch: filteredItems.length > 0
            };
        });
    }

    function renderPage() {
        const keyword = searchInput.value;
        const filteredGroups = filterGroupsByKeyword(keyword);

        let html = '';
        for (let i = 0; i < filteredGroups.length; i++) {
            const { group, itemsFiltered, hasMatch } = filteredGroups[i];
            if (!hasMatch) continue;

            const groupName = group.groupName;
            if (groupCollapsedState[groupName] === undefined) groupCollapsedState[groupName] = false;
            const isGroupCollapsed = groupCollapsedState[groupName];
            const groupIcon = isGroupCollapsed ? '▶' : '▼';

            const total = itemsFiltered.length;
            const defaultShow = 6;
            if (cardExpandedState[groupName] === undefined) cardExpandedState[groupName] = false;
            const isCardsExpanded = cardExpandedState[groupName];
            let showCount = total;
            let showExpandButton = false;
            if (total > defaultShow) {
                showExpandButton = true;
                showCount = isCardsExpanded ? total : defaultShow;
            }
            const displayedItems = itemsFiltered.slice(0, showCount);
            const cardsHtml = displayedItems.map(item => renderCard(item)).join('');

            html += `
                <div class="group" data-group-name="${escapeHtml(groupName)}">
                    <div class="group-header" data-group-toggle="${escapeHtml(groupName)}">
                        <div class="group-title">
                            ${escapeHtml(groupName)}
                            <span class="count">${total}</span>
                        </div>
                        <div class="toggle-icon">${groupIcon}</div>
                    </div>
                    <div class="group-content ${isGroupCollapsed ? 'collapsed' : ''}">
                        <div class="cards-grid">
                            ${cardsHtml}
                        </div>
                        ${showExpandButton ? `
                        <div class="expand-btn-wrapper">
                            <button class="expand-btn" data-group-expand="${escapeHtml(groupName)}">
                                ${isCardsExpanded ? '收起 ▲' : '展开更多 ▼'}
                            </button>
                        </div>
                        ` : ''}
                    </div>
                </div>
            `;
        }

        if (html === '') {
            groupsContainer.innerHTML = `<div class="no-results">😢 没有找到与 “${escapeHtml(keyword)}” 相关的资源</div>`;
        } else {
            groupsContainer.innerHTML = html;
        }

        // 绑定分组折叠事件
        document.querySelectorAll('.group-header').forEach(header => {
            const groupName = header.getAttribute('data-group-toggle');
            header.addEventListener('click', (e) => {
                e.stopPropagation();
                groupCollapsedState[groupName] = !groupCollapsedState[groupName];
                renderPage();
            });
        });

        // 绑定卡片展开/收起按钮事件
        document.querySelectorAll('.expand-btn').forEach(btn => {
            const groupName = btn.getAttribute('data-group-expand');
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                cardExpandedState[groupName] = !cardExpandedState[groupName];
                renderPage();
            });
        });
    }

    searchInput.addEventListener('input', () => {
        groupsData.forEach(group => {
            cardExpandedState[group.groupName] = false;
            groupCollapsedState[group.groupName] = false;
        });
        renderPage();
    });

    renderPage();
</script>
</body>
</html>
